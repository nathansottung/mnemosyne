<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mnemosyne</title>
<style>
:root{
  --ink:#1c241f; --ink-2:#4a544e; --ink-3:#7d857f;
  --bg:#e7eae6; --panel:#fcfcfa; --line:#c9cfc9; --line-2:#e2e5e0;
  --act:#2e5e4e; --act-ink:#f2f5f2;
  --ok:#2e5e4e; --warn:#9a6b1f; --bad:#a03123; --idle:#8a938c;
  /* the six protection-status colors — ok/warn/bad/idle reused, plus blue
     (over-complete) and purple (out-of-policy). No other status colors exist. */
  --blue:#1e3d8f; --purple:#6b2d86;
  --mono:ui-monospace,'Cascadia Mono','JetBrains Mono',Menlo,Consolas,monospace;
  --sans:system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box} html,body{margin:0;height:100%}
body{font:14px/1.5 var(--sans);color:var(--ink);background:var(--bg);display:flex}
button{font:inherit;cursor:pointer}
input,select{font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:3px;padding:6px 8px}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--act);outline-offset:1px}

/* ---- sidebar: drawer labels ---- */
nav{width:212px;min-height:100vh;background:var(--ink);color:#cfd6d0;padding:22px 0;flex-shrink:0}
.wordmark{font:700 15px/1 var(--mono);letter-spacing:.42em;color:#f2f5f2;padding:0 22px 6px}
.wordsub{font:11px/1.4 var(--mono);color:#8fa398;padding:0 22px 20px;letter-spacing:.08em}
nav a{display:block;padding:10px 22px;color:#cfd6d0;text-decoration:none;font-size:13.5px;
  border-left:3px solid transparent}
nav a:hover{background:#28352f}
nav a.on{background:#28352f;color:#fff;border-left-color:#b9c8bf}
nav .lamp{margin:26px 22px 0;padding:10px 12px;border:1px solid #3a4a42;border-radius:4px;
  font:11.5px var(--mono);color:#9fb2a7}
nav .lamp b{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:1px}
nav .lamp.ok b{background:#6fbf9a}.lamp.bad b{background:#e08573}
/* ---- collapsible nav groups (plain job descriptions live in each item's title) ---- */
nav .grp{border-top:1px solid #26332d}
nav .grphdr{display:flex;align-items:center;gap:8px;padding:9px 22px 7px;font:600 10px/1 var(--mono);
  letter-spacing:.16em;color:#7f938a;cursor:pointer;user-select:none;background:none;border:none;width:100%;text-align:left}
nav .grphdr:hover{color:#cfd6d0}
nav .grphdr .caret{display:inline-block;width:0;height:0;border:4px solid transparent;border-top-color:currentColor;transition:transform .12s ease;opacity:.8}
nav .grp.collapsed .grphdr .caret{transform:rotate(-90deg)}
nav .grp.collapsed .grpitems{display:none}
nav .grphdr:focus-visible{outline:2px solid #b9c8bf;outline-offset:-2px}

/* ---- main ---- */
main{flex:1;min-width:0;padding:28px 34px 60px;max-width:1160px}
h1{font:600 19px var(--sans);margin:0 0 4px}
.crumb{font:11px var(--mono);letter-spacing:.18em;color:var(--ink-3);text-transform:uppercase;margin-bottom:22px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:16px 18px;margin-bottom:16px}
.panel h2{font:600 13px var(--sans);margin:0 0 10px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.08em}
/* one plain help sentence under a setting label (the plain-language standard) */
.help{font-size:11.5px;line-height:1.45;color:var(--ink-3);margin:2px 0 13px}
label+.help,select+.help,input+.help,textarea+.help{margin-top:3px}
/* ---- Home overview: totals strip + data cards ---- */
.hstrip{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.htile{flex:1;min-width:150px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:12px 14px}
.htile .hk{font:600 10px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
.htile .hv{font:600 22px var(--sans);margin-top:3px;color:var(--ink)}
.htile .hu{font-size:11px;color:var(--ink-3);margin-top:2px;line-height:1.35}
.hcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.hcard{display:block;text-decoration:none;color:inherit;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:12px 14px}
.hcard:hover{border-color:var(--ink-3)}
.hcard-t{font:600 13.5px var(--sans);color:var(--ink);margin-bottom:2px}
.hcard-ung{border-style:dashed;border-color:var(--act)}
/* ---- view modes: purpose banner, advanced note, settings disclosure, mode picker ---- */
.purpose{font-size:12.5px;line-height:1.45;color:var(--ink-2);background:var(--panel);border:1px solid var(--line);
  border-left:3px solid var(--act);border-radius:5px;padding:9px 13px;margin:0 0 16px}
.advnote{font-size:12px;color:var(--ink-2);background:rgba(154,107,31,.10);border:1px solid var(--warn);
  border-radius:5px;padding:8px 12px;margin:0 0 16px}
details.adv{margin:6px 0 12px;border-top:1px dashed var(--line);padding-top:8px}
details.adv>summary{cursor:pointer;font:600 11.5px var(--sans);color:var(--ink-3);letter-spacing:.04em;list-style:none;user-select:none}
details.adv>summary::before{content:'';display:inline-block;width:0;height:0;border:4px solid transparent;border-left-color:currentColor;margin-right:7px;vertical-align:2px;transition:transform .12s ease}
details.adv[open]>summary::before{transform:rotate(90deg)}
details.adv>summary:hover{color:var(--ink)}
.modepick{display:flex;gap:0;border:1px solid var(--line);border-radius:6px;overflow:hidden;width:fit-content}
.modepick button{background:var(--panel);border:none;border-right:1px solid var(--line);padding:8px 16px;font:600 12.5px var(--sans);color:var(--ink-2);cursor:pointer}
.modepick button:last-child{border-right:none}
.modepick button.on{background:var(--act);color:var(--act-ink)}
/* the single "how much to see" control at the foot of the nav (replaces per-group
   reveals — one roll-up mechanism, no double nesting) */
nav .navmode{display:flex;margin:16px 16px 0;border:1px solid #3a4a42;border-radius:6px;overflow:hidden}
nav .navmode button{flex:1;background:none;border:none;border-right:1px solid #3a4a42;color:#8fa398;
  padding:6px 4px;font:600 10.5px var(--mono);letter-spacing:.02em;cursor:pointer}
nav .navmode button:last-child{border-right:none}
nav .navmode button:hover{color:#cfd6d0;background:#28352f}
nav .navmode button.on{background:#28352f;color:#fff}
nav .navmode-lbl{padding:14px 22px 4px;font:600 9px/1 var(--mono);letter-spacing:.16em;color:#5f7167}
/* "start here" cue on the Home item while the catalog is still empty */
nav a .navstart{display:inline-block;margin-left:7px;background:#b9c8bf;color:#1c241f;font:700 9px/1 var(--mono);
  letter-spacing:.04em;padding:2px 6px;border-radius:9px;vertical-align:1px}
table{width:100%;border-collapse:collapse}
th{font:600 11px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);
  text-align:left;padding:6px 10px;border-bottom:1px solid var(--line)}
td{padding:8px 10px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tr:last-child td{border-bottom:none}
.mono{font:12.5px var(--mono)} .dim{color:var(--ink-3)} .num{text-align:right;font:12.5px var(--mono)}
.btn{background:var(--act);color:var(--act-ink);border:none;border-radius:3px;padding:7px 13px;font-size:13px}
.btn:hover{background:#254c3f}
.btn.ghost{background:transparent;color:var(--act);border:1px solid var(--act)}
.btn.ghost:hover{background:#2e5e4e14}
.btn[disabled]{opacity:.45;cursor:default}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{display:inline-block;font:11.5px var(--mono);border:1px solid var(--line);border-radius:2px;
  background:#fff;padding:1px 7px;letter-spacing:.04em}
.chip::before{content:"";display:inline-block;width:3px;height:9px;margin-right:6px;
  background:repeating-linear-gradient(90deg,var(--ink) 0 1px,transparent 1px 3px);vertical-align:-1px}
.etag{font:10px var(--mono);letter-spacing:.05em;padding:1px 5px;border-radius:2px;vertical-align:1px}
.etag.enc{background:#2e5e4e1f;color:var(--act)} .etag.plain{background:#9a7a101f;color:#8a6d10}
.etag.due{background:#9a7a101f;color:#8a6d10}
.stamp{font:11px var(--mono);letter-spacing:.06em;padding:2px 8px;border-radius:2px;color:#fff;display:inline-block}
.stamp.VERIFIED{background:var(--ok)} .stamp.FAILED{background:var(--bad)}
.stamp.PLANNED{background:var(--idle)} .stamp.STAGED,.stamp.WRITTEN{background:#5b7367}
.stamp.BUILDING,.stamp.WRITING{background:var(--warn)}
.err{color:var(--bad);font:12.5px var(--mono)}
.empty{color:var(--ink-3);padding:26px 10px;text-align:center;font-size:13.5px}

/* ---- signature: package lifecycle rail ---- */
.rail{display:flex;align-items:center;gap:0;min-width:190px}
.rail i{width:11px;height:11px;border:1.5px solid var(--idle);border-radius:2px;background:#fff;flex-shrink:0}
.rail s{flex:1;height:2px;background:var(--line);min-width:10px;text-decoration:none}
.rail i.done{background:var(--ok);border-color:var(--ok)}
.rail s.done{background:var(--ok)}
.rail i.now{border-color:var(--warn);background:var(--warn);animation:tick 1.1s steps(2) infinite}
.rail.dead i.done,.rail.dead i.now{background:var(--bad);border-color:var(--bad)}
.rail.dead s.done{background:var(--bad)}
@keyframes tick{50%{opacity:.35}}
@media (prefers-reduced-motion:reduce){.rail i.now{animation:none}}
.raillbl{font:10px var(--mono);color:var(--ink-3);letter-spacing:.1em;margin-top:3px}

/* ---- burn queue: one square per disc ---- */
.discs{display:flex;flex-wrap:wrap;gap:4px;margin:4px 0 10px}
.disc{width:16px;height:16px;border-radius:3px;border:1px solid var(--line);background:var(--line-2)}
.disc.done{background:var(--ok);border-color:var(--ok)}
.disc.failed{background:var(--bad);border-color:var(--bad)}
.disc.pending{background:var(--line-2)}
.disc.active{background:var(--warn);border-color:var(--warn);animation:tick 1.1s steps(2) infinite}

.bar{height:6px;background:var(--line-2);border-radius:3px;overflow:hidden}
.bar div{height:100%;background:var(--act)}
#toast{position:fixed;right:20px;bottom:20px;max-width:420px;display:flex;flex-direction:column;gap:8px;z-index:9}
#toast div{background:var(--ink);color:#eef2ee;padding:10px 14px;border-radius:4px;font-size:13px}
#toast div.bad{background:var(--bad)}
/* Live Activity panel — a global "what's running right now" window, fixed above
   the toast stack, visible on every tab while any job runs. */
#activity{position:fixed;right:20px;bottom:20px;width:340px;max-width:calc(100vw - 40px);z-index:8;
  background:var(--panel);border:1px solid var(--line);border-radius:6px;box-shadow:0 6px 22px #0003;
  font-size:12px;overflow:hidden}
#activity.hide{display:none}
#activity .ahead{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--act);color:var(--act-ink);cursor:pointer;user-select:none}
#activity .ahead b{flex:1;font-size:12px;font-weight:600}
#activity .ahead .spin{width:11px;height:11px;border:2px solid #ffffff66;border-top-color:#fff;border-radius:50%;animation:aspin .8s linear infinite}
@keyframes aspin{to{transform:rotate(360deg)}}
#activity .ahead .abtn{background:#ffffff26;border:none;color:inherit;border-radius:3px;padding:1px 7px;font-size:11px;cursor:pointer}
#activity .abody{max-height:46vh;overflow:auto}
#activity.collapsed .abody{display:none}
#activity .ajob{padding:9px 11px;border-top:1px solid var(--line-2)}
#activity .ajob:first-child{border-top:none}
#activity .astep{color:var(--ink);word-break:break-word}
#activity .astep .k{color:var(--idle)}
#activity .ameta{margin-top:5px;color:var(--idle);font:11px var(--mono);display:flex;flex-wrap:wrap;gap:4px 10px}
#activity .ameta b{color:var(--act)}
#activity .adbg{margin-top:5px;color:var(--idle);font:10.5px var(--mono);white-space:pre-wrap;word-break:break-all;border-top:1px dashed var(--line-2);padding-top:4px}
dialog{border:1px solid var(--line);border-radius:6px;padding:20px 22px;max-width:520px;width:92%}
dialog::backdrop{background:#1c241f66}
label{display:block;font:600 12px var(--sans);color:var(--ink-2);margin:12px 0 4px}
.full{width:100%}
@media (max-width:760px){body{flex-direction:column}nav{width:100%;min-height:0}nav a{border-left:none}main{padding:18px}
  nav .grphdr{padding:10px 18px}nav a{padding:9px 18px}}

/* ---- accessibility: focus + screen-reader-only ---- */
a:focus-visible,[tabindex]:focus-visible,tr[role="button"]:focus-visible{outline:2px solid var(--act);outline-offset:2px}
nav a:focus-visible{outline-color:#b9c8bf;outline-offset:-2px}
.sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

/* ---- protection status: ALWAYS color + icon + text together, never color alone ---- */
.protbadge{display:inline-flex;align-items:center;gap:5px;font:11px var(--mono);border:1px solid;
  border-radius:3px;padding:1px 7px;letter-spacing:.02em;white-space:nowrap;vertical-align:1px}
.protbadge b{font-weight:700}
.protrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.protcount{flex:1;min-width:118px;background:var(--panel);border:1px solid var(--line);border-left-width:3px;
  border-radius:5px;padding:9px 12px;text-decoration:none;color:inherit}
.protcount .n{font:600 22px var(--sans);line-height:1.05}
.protcount .l{font:10.5px var(--mono);letter-spacing:.04em;text-transform:uppercase;margin-top:1px}
/* ---- protection tree rows ---- */
.tnode{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line-2)}
.tnode:last-child{border-bottom:none}
.tname{font:12.5px var(--mono);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tprof{font:10.5px var(--mono);color:var(--ink-3)}
.tprof.explicit{color:var(--ink-2);font-weight:600}

/* ---- view header + inline help ----
   NOTE: the round info affordance is a <button class="help"> and MUST be scoped to
   button.help — a bare `.help` here would also capture the plain help SENTENCES
   (`<div class="help">`) and squash them into a 20px circle (text overlap). */
.hd{display:flex;align-items:center;gap:9px}
button.help{background:transparent;border:1px solid var(--line);color:var(--ink-3);border-radius:50%;
  width:20px;height:20px;padding:0;margin:0;font:700 12px var(--sans);line-height:1;flex-shrink:0;cursor:pointer}
button.help:hover{border-color:var(--act);color:var(--act)}

/* ---- destructive / sensitive actions ---- */
.btn.danger{background:transparent;color:var(--bad);border:1px solid var(--bad)}
.btn.danger:hover{background:#a0312312}

/* ---- dashboard: pipeline map ---- */
.pipemap{display:flex;align-items:stretch;gap:0;margin-bottom:18px;flex-wrap:wrap}
.stage{flex:1;min-width:128px;background:var(--panel);border:1px solid var(--line);border-radius:5px;
  padding:12px 14px;text-decoration:none;color:inherit;display:block}
.stage:hover{border-color:var(--act);background:#fff}
.stage .k{font:10px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
.stage .v{font:600 24px var(--sans);color:var(--act);margin-top:2px;line-height:1.1}
.stage .u{font:11px var(--mono);color:var(--ink-3)}
.stagearrow{align-self:center;color:var(--ink-3);padding:0 7px;font:15px var(--mono)}

/* ---- getting-started checklist ---- */
.chk{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--line-2)}
.chk:last-child{border-bottom:none}
.chk .mk{width:23px;height:23px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font:600 13px var(--sans);border:1.5px solid var(--line);color:var(--ink-3);background:#fff}
.chk.done .mk{background:var(--ok);border-color:var(--ok);color:#fff}
.chk .t{font:600 14px var(--sans)} .chk.done .t{color:var(--ink-3)}
.chk .d{font-size:12.5px;color:var(--ink-3);margin-top:1px}
.chk .req{font-size:11.5px;color:var(--ink-2);margin-top:5px;padding:6px 9px;background:rgba(46,94,78,.06);border:1px solid var(--line-2);border-radius:5px}
.chk .req a{color:var(--act)}
/* ---- first-run setup interview ---- */
.setup{max-width:660px}
.setup .step{font:600 11px var(--mono);letter-spacing:.16em;color:var(--ink-3);text-transform:uppercase}
.setup .prog{display:flex;gap:6px;margin:8px 0 20px}
.setup .prog i{flex:1;height:4px;border-radius:2px;background:var(--line)}
.setup .prog i.on{background:var(--act)}
.setup h1{margin:0 0 3px}
.setup .q{font-size:13px;color:var(--ink-2);margin-bottom:16px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;background:var(--panel);
  border:1.5px solid var(--line);border-radius:8px;padding:13px 15px;cursor:pointer;transition:border-color .1s}
.opt:hover{border-color:var(--ink-3)}
.opt.on{border-color:var(--act);background:rgba(46,94,78,.05)}
.opt .box{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--line-2);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.opt.multi .box{border-radius:5px}
.opt.on .box{background:var(--act);border-color:var(--act)}
.opt .ot{display:block;font:600 14px var(--sans);color:var(--ink);line-height:1.3}
.opt .od{display:block;font-size:12px;color:var(--ink-3);margin-top:3px;line-height:1.45}
.opt .oneed{display:block;font-size:11.5px;color:var(--act);margin-top:6px;line-height:1.45}
.opt .oneed a{color:var(--act)}
.setup .acts{display:flex;align-items:center;gap:10px;margin-top:22px}
.setup .acts .sp{flex:1}
.setup .skip{background:none;border:none;color:var(--ink-3);font-size:12.5px;text-decoration:underline;padding:6px}
.setup .skip:hover{color:var(--ink)}
/* summary screen */
.sumline{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line-2)}
.sumline:last-child{border-bottom:none}
.sumline .sk{flex:0 0 168px;font:600 12.5px var(--sans);color:var(--ink-2)}
.sumline .sv{flex:1}
.sumline .sv b{color:var(--ink)}
.sumline .sw{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.sumline .sa{color:var(--act);font-size:11.5px;text-decoration:none;white-space:nowrap}
.sumline .sa:hover{text-decoration:underline}
/* ---- Settings: unified integrity grid ---- */
.ivgrid{width:100%;border-collapse:collapse;font-size:12.5px}
.ivgrid th,.ivgrid td{padding:7px 10px;border-bottom:1px solid var(--line-2);text-align:center}
.ivgrid th:first-child,.ivgrid td:first-child{text-align:left;color:var(--ink-2)}
.ivgrid th{font:600 11px var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}
.ivgrid .custom{border-left:1px dashed var(--line)}
.ivgrid .ivactive{background:rgba(46,94,78,.10);font-weight:600;color:var(--ink)}
.ivgrid th.ivactive{color:var(--act)}
.ivbadge{display:inline-block;padding:2px 9px;border-radius:11px;border:1px solid;font:600 11px var(--mono)}
.ivknob{display:flex;flex-direction:column;gap:2px}
.ivmatch{font-size:11px;color:var(--ink-3)}
.ivmatch.custom{color:var(--warn)}
/* ---- Settings: external tools rows ---- */
.tool{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line-2)}
.tool:last-child{border-bottom:none}
.tool .tinfo{flex:1;min-width:0}
.tool .tname{font:600 13.5px var(--sans)}
.tool .tadds{font-size:12px;color:var(--ink-3);margin-top:1px}
.tool .tpath{font:11px var(--mono);color:var(--ink-3);margin-top:3px;word-break:break-all}
.tool .tact{display:flex;flex-direction:column;gap:5px;align-items:stretch;flex:0 0 168px}
.tool .tact .row{gap:5px}
.toolstat{font:600 11px var(--mono);padding:2px 8px;border-radius:10px;white-space:nowrap;align-self:flex-end}
.toolstat.found{background:rgba(46,94,78,.12);color:var(--ok)}
.toolstat.missing{background:rgba(160,49,35,.10);color:var(--bad)}
.toolstat.na{background:var(--line-2);color:var(--ink-3)}
/* ---- Settings: memory line ---- */
.memline{font-size:12px;color:var(--ink-2);margin:4px 0}
.memline b{color:var(--ink)}
.membar{height:7px;border-radius:4px;background:var(--line);overflow:hidden;margin:4px 0;max-width:320px}
.membar i{display:block;height:100%;background:var(--act)}
.setinfo{font:12px var(--mono);color:var(--ink-2);background:var(--panel);border:1px solid var(--line-2);border-radius:5px;padding:7px 10px;word-break:break-all}
/* ---- Where your data lives ---- */
.wrow{padding:12px 0;border-bottom:1px solid var(--line-2)}
.wrow:last-child{border-bottom:none}
.wname{font:600 13.5px var(--sans);color:var(--ink)}
.wwhat{font-size:12.5px;line-height:1.5;color:var(--ink-2);margin-top:2px}
.wherelink{display:inline-block;font-size:12px;color:var(--act);text-decoration:none}
.wherelink:hover{text-decoration:underline}
/* ---- Card check verdict banner ---- */
.ccban{border-radius:7px;padding:13px 16px;margin-bottom:16px;font-size:14.5px;line-height:1.5;border:1px solid}
.ccban.ccok{background:rgba(46,94,78,.10);border-color:var(--ok);color:var(--ink)}
.ccban.ccbad{background:rgba(160,49,35,.08);border-color:var(--bad);color:var(--ink)}
.ccban.ccneutral{background:var(--panel);border-color:var(--line);color:var(--ink-2)}
</style>
</head>
<body>
<nav>
  <div class="wordmark">MNEMOSYNE</div>
  <div class="wordsub" id="wordsub">archival vault</div>
  <div id="navgroups"></div>
  <div class="lamp" id="lamp" role="status" aria-live="polite"><b></b><span>checking tools…</span></div>
</nav>
<main id="view"></main>
<div id="activity" class="hide" aria-live="polite"></div>
<div id="toast"></div>

<script>
const $=q=>document.querySelector(q);
/* Auth: a remote (non-localhost) server requires a bearer token. We store it in
   sessionStorage and attach it to every /api call; on a 401 we prompt ONCE
   (concurrent 401s share the single prompt), save it, and retry. */
let _tok=sessionStorage.getItem('mnemo_token')||'';let _tokPrompt=null;
function setToken(t){_tok=(t||'').trim();if(_tok)sessionStorage.setItem('mnemo_token',_tok);else sessionStorage.removeItem('mnemo_token');}
function askToken(){if(_tokPrompt)return _tokPrompt;
  _tokPrompt=new Promise(res=>{const t=window.prompt('This Mnemosyne server requires an access token.\nPaste the Authorization Bearer token (config auth_token / MNEMO_AUTH_TOKEN):','');setToken(t);_tokPrompt=null;res(_tok);});
  return _tokPrompt;}
/* mediaURL appends the token as a query param for browser-native GETs (opening a
   label/QR/report in a new tab can't set an Authorization header). */
function mediaURL(u){return _tok?u+(u.includes('?')?'&':'?')+'token='+encodeURIComponent(_tok):u;}
const api=async(m,u,b)=>{
  const go=()=>{const h={'Content-Type':'application/json'};if(_tok)h['Authorization']='Bearer '+_tok;
    return fetch(u,{method:m,headers:h,body:b?JSON.stringify(b):undefined});};
  let r=await go();
  if(r.status===401){await askToken();r=await go();}
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||r.statusText);
  return j;};
const GB=n=>((n||0)/1e9).toFixed(2);

// ---- space advice: all numbers/verdicts come from GET /api/space-advice; the
// UI only formats them so the staging math lives in exactly one place (Go).
const SPACE_COLOR={red:'var(--bad)',amber:'#9a7a10',green:'var(--ok)',unknown:'var(--line)'};
function GBn(b){return (b==null||b<0)?'?':GB(b)}
function spaceChip(v){const c=SPACE_COLOR[v]||'var(--line)';const t={green:'FITS',amber:'TIGHT',red:'TOO SMALL'}[v]||'—';
  return `<span class="etag" style="border-color:${c};color:${c}" title="green ≥110% · amber ≥100% · red under 100%">${t}</span>`}
// Staging need vs free, with the standard red guidance ("staging is just a folder…").
function stagingNeedHTML(dir,free,need,verdict){
  let h=`<div class="dim" style="font:12px var(--mono);margin:4px 0">staging <b>${esc(dir||'(unset)')}</b> · needs ≥ <b>${GBn(need)} GB</b> · has ${GBn(free)} GB ${spaceChip(verdict)}</div>`;
  if(verdict==='red')h+=`<div style="color:var(--bad);font-size:12px;margin:2px 0 4px">Staging is just a folder — point it at any drive with ${GBn(need)} GB free (<a href="#settings" style="color:var(--act)">Settings</a>).</div>`;
  return h}
const toast=(m,bad)=>{const d=document.createElement('div');if(bad)d.className='bad';d.textContent=m;$('#toast').append(d);setTimeout(()=>d.remove(),bad?7000:3500)};
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---- inline help: one shared panel, content in one object (easy to edit) ---- */
const HELP={
  home:['Home — archive health at a glance','This board shows the state of everything you keep. The strip across the top (Catalog → Package → Write → Verify) shows live totals for each stage of the pipeline and doubles as navigation — click a stage to go there. The table below breaks every archive down by package status, protection (verified copies vs. your goal), unresolved drift, and packages due for re-verification. Every number links straight to the relevant view.'],
  vault:['Vault — archives & file search','An Archive is a body of work you keep together (e.g. "Personal", "Client Work"). Scan folders into it — every file is SHA-256 hashed at the source. Plan groups files into media-sized packages; Rescan & compare detects what changed since you backed up. The search box answers the real questions: which package and which physical volume holds a given file — searchable by path, by SHA-256 (exact or prefix, to ask "is THIS file backed up?"), by extension, and by protection status, scoped to one archive (e.g. "show me every unprotected original").'],
  protection:['Protection — the 3-2-1 model, made explicit','The real 3-2-1 rule has THREE dimensions: how many copies, across how many distinct kinds of media, and how many offsite. A Profile expresses all three; you assign one to an Archive and, optionally, override it on any folder path (nearest-ancestor-wins). Every file then gets exactly one of six statuses — Unassigned, Not backed up, Partial, Complete, Over-complete, Out-of-policy — always shown as colour + icon + text. Only verified copies count toward requirements. Built-in profiles are immutable; duplicate one to start a custom policy.'],
  integrity:['Integrity — how hard each copy is proven','The app has many independent assurance knobs — build verification depth, par2 redundancy, routine verify level, the re-verify window, read-back. This panel unifies them into three presets: ARCHIVAL (prove everything — for anything irreplaceable), BALANCED, and FAST (skip proving contents — only for re-creatable data, and flagged amber). Pick one globally or override per archive; every individual knob stays editable, at which point the preset reads "Custom". Read-back after every write is always on and cannot be disabled. Each package\'s manifest and each volume inventory record the effective settings used, so the media self-document how much assurance they were built with.'],
  packages:['Packages — the archival units','A Package is one self-contained, media-sized unit: a tar of files + par2 parity + manifest + RESTORE.txt (an OAIS AIP in plain English). The lifecycle rail reads PLANNED → BUILDING → STAGED → WRITING → WRITTEN → VERIFIED; red means FAILED. Build a package, then Write it to a volume with read-back verification. Packages too big for one medium are spanned across several, one tape at a time.'],
  burn:['Burn — the optical disc queue','Optical media can\'t stream continuously, so discs are fed one at a time. A burn queue holds one disc per package and survives reboots (a disc caught mid-burn resets to pending — it may be a coaster). Click "Burn next disc", wait, then write the package name on the physical disc. Square colours: green = done, red = failed, amber = in progress, grey = pending.'],
  volumes:['Volumes — where the bytes physically live','A Volume is a physical medium you can hold: a tape, drive, or disc, with a barcode, kind, an Onsite/Offsite flag (the "1" in 3-2-1), and free-text location ("office safe"). Each Copy records which package sits on which volume and when it last verified. Scan a barcode into the lookup box to jump straight to a medium\'s contents — no mounting needed. When a volume is done, Finalize seals it: it enforces preconditions (recent verify, free-space buffer, SMART), writes a seal record + inventory onto the medium, marks it SEALED (further writes need an audit-logged unseal), and opens the printable label — the "close the box and label it" moment.'],
  cardcheck:['Check a card — is it already backed up?','Plug in an SD/CF card or a drive and Mnemosyne reads it (never writes, never adds it as a source) and checks every file BY CONTENT against your entire inventory — archives, packaged copies, and every drive you have inventoried. You get the answer that matters before a reformat: which frames are already safe (and where they live), and which are new and still need copying off. Matching is by SHA-256, so a file counts as backed up the moment its content is found anywhere, no matter its name or folder on the card.'],
  dock:['Dock — ingest a stack of legacy drives, one at a time','Pick the Archive(s) to reconcile against, then dock drives one by one. Mnemosyne watches for each newly-inserted drive, and on one click does everything hands-off: identifies the drive by serial, hashes every file and matches it by CONTENT against your archives, records the matches as verified copies, and writes an inventory sidecar onto the drive itself. It is strictly read-only toward your sources — NAS folders are only ever hashed. A re-inserted drive is recognized by serial and re-verified, not re-adopted. The session survives closing the app; resume it days later.'],
  keys:['Keys — encryption secrets','Encrypted packages use per-package random ~288-bit passphrases that live ONLY in keystore files — the catalog stores fingerprints, never the secret. Encrypted builds refuse to run until ≥2 keystores on different devices are registered and in sync. Print a QR card per key, and export a Recovery Kit for the fireproof box.'],
  jobs:['Jobs — background work','Long operations (scan, build, write, verify, reconcile, recovery kit) run in the background so the UI stays responsive. It is safe to navigate away; this list refreshes automatically while anything is still running.'],
  settings:['Settings — one config file','Everything lives in one config.json in the data folder: paths to the external tools, the staging folder, keystore locations, redundancy goal, re-verify window, write throttle, and the optical burn command. Preflight at the top shows whether tar/gpg/par2 (and any LTFS tape) are ready.'],
  where:['Where your data lives — the honesty map','One screen listing everything Mnemosyne ever writes — the catalog and its daily backups, config, keystores, staging, the destinations you pick, the small inventory/seal sidecars it puts ONLY on media it writes itself, and the reversible quarantine folders — followed by the equally prominent inverse: what it NEVER writes to (your source folders and drives you adopt). Every path is read from your live settings. The one enforcement rule (every write destination is checked against your sources and refused if it lands inside one) is backed by named tests you can run yourself.'],
};
function helpBtn(k){return `<button class="help" aria-label="Help: what the ${esc(k)} view is for" title="What is this view for?" onclick="showHelp('${k}')">i</button>`}
// Each help panel links to the matching plain-language Handbook guide (opens on
// the project's docs site). Handbook lives in docs/handbook/ in the repo.
const HANDBOOK='https://github.com/nathansottung/mnemosyne/blob/main/docs/handbook/';
const HELP_GUIDE={home:['00-what-is-this.md','What is this? & first run'],vault:['03-your-first-backup.md','Your first backup'],
  protection:['04-the-3-2-1-setup.md','The 3-2-1 setup'],integrity:['04-the-3-2-1-setup.md','Protection & integrity'],
  packages:['03-your-first-backup.md','Your first backup'],burn:['06-discs-and-drives.md','Discs, mirrors & old drives'],
  volumes:['06-discs-and-drives.md','Discs, mirrors & old drives'],dock:['06-discs-and-drives.md','Adopting old drives'],
  keys:['09-the-recovery-kit.md','Keys & the Recovery Kit'],jobs:['07-checking-on-your-archive.md','Checking on your archive'],
  settings:['02-set-up-safely.md','Set up safely'],where:['10-where-your-data-lives.md','Where your data lives']};
function showHelp(k){const e=HELP[k];if(!e)return;const g=HELP_GUIDE[k];
  const link=g?`<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--line)"><a href="${HANDBOOK}${g[0]}" target="_blank" rel="noopener" style="color:var(--act);font-weight:600">Handbook: ${esc(g[1])} →</a></div>`:'';
  dlg(`<h1>${esc(e[0])}</h1><div style="margin-top:8px;line-height:1.62;color:var(--ink-2)">${esc(e[1])}</div>${link}`,async()=>{})}
function hdr(title,crumb,key){return `<div class="hd"><h1>${title}</h1>${helpBtn(key)}</div><div class="crumb">${esc(crumb)}</div>`}
function stamp(s){return `<span class="stamp ${esc(s)}">${esc(s)}</span>`}
function emptyState(msg,actionsHTML){return `<div class="empty">${msg}${actionsHTML?`<div class="row" style="justify-content:center;margin-top:12px">${actionsHTML}</div>`:''}</div>`}

const STAGES=['PLANNED','BUILDING','STAGED','WRITING','WRITTEN','VERIFIED'];
function rail(c){
  // Adopted packages never went through the build/write pipeline; show them as a
  // fully-done rail (they arrived pre-made and were hash-verified on adoption).
  if(c.status==='ADOPTED-VERIFIED'){
    let h='<div class="rail" title="adopted from existing media">';
    STAGES.forEach((s,i)=>h+='<i class="done"></i>'+(i<STAGES.length-1?'<s class="done"></s>':''));
    return h+'</div><div class="raillbl">ADOPTED · VERIFIED</div>';
  }
  let idx=STAGES.indexOf(c.status); const dead=c.status==='FAILED';
  if(dead) idx=Math.max(1,STAGES.indexOf('STAGED')*(c.staged_dir?1:0)||1);
  if(c.status==='VERIFIED') idx=STAGES.length-1;
  let h='<div class="rail'+(dead?' dead':'')+'" title="'+esc(c.status)+'">';
  STAGES.forEach((s,i)=>{
    const cls=i<idx?'done':(i===idx?(c.status==='VERIFIED'?'done':'now'):'');
    h+='<i class="'+cls+'"></i>'+(i<STAGES.length-1?'<s class="'+(i<idx?'done':'')+'"></s>':'');
  });
  return h+'</div><div class="raillbl">'+esc(c.status)+(c.verify_ok===false?' · MEDIA CHECK FAILED':'')+'</div>';
}

const TORDER=['tar','hash','stage_verify','encrypt','stage','crypt_verify','par2'];
function timingStr(t){if(!t)return '';const parts=[];
  for(const k of TORDER)if(t[k]!=null)parts.push(`${k} ${(+t[k]).toFixed(1)}s`);
  for(const k in t)if(!TORDER.includes(k))parts.push(`${k} ${(+t[k]).toFixed(1)}s`);
  return parts.length?'⏱ '+parts.join(' · '):''}
/* Build-time attestation: every hop of the custody chain now PROVEN. "full"
   shows a green stamp; "fast" shows the amber warning that contents +
   decryptability are unproven. */
function buildVerifiedStr(c){const b=c.build_verified;if(!b)return '';
  const preset=b.preset?` <span class="dim">· ${esc(b.preset)}${b.par2_percent?' · par2 '+b.par2_percent+'%':''}</span>`:'';
  if(b.mode==='none'||b.mode==='fast')return `<div style="font-size:11px;margin-top:2px"><span class="etag due" title="${esc(b.warning||'')}">Warning: FAST build — contents &amp; decrypt UNPROVEN</span>${preset}</div>`;
  const parts=[];if(b.contents)parts.push('contents');if(b.decrypt_roundtrip)parts.push('decrypt round-trip');
  if(!parts.length)return '';
  return `<div class="dim" style="font-size:11px;margin-top:2px" title="proven at build; media self-document the effective integrity">build-verified: ${parts.join(' · ')}${preset}</div>`}

/* ---- verification history + due tracking ---- */
function latestOKTime(c){let t=null;
  for(const e of (c.verify_events||[]))if(e.ok&&(!t||e.at>t))t=e.at;
  if(!t&&c.verify_ok&&c.verified_at)t=c.verified_at;
  return t}
function isVerifyDue(c,months){if(c.status!=='VERIFIED'&&c.status!=='ADOPTED-VERIFIED')return false;
  const t=latestOKTime(c);if(!t)return true;
  const cut=new Date();cut.setMonth(cut.getMonth()-(months||12));return new Date(t)<cut}
function dueCount(cs,months){return (cs||[]).filter(c=>isVerifyDue(c,months)).length}
function ringStr(c){const r=c.ring_stats;if(!r)return '';
  return `<div class="dim mono" style="font-size:11px" title="ring buffer decouples read from write">→ read ${r.read_mbps} MB/s · write ${r.write_mbps} MB/s · min buffer ${r.min_fill}/${r.buffer_blocks} blk · ${r.starved_events} starve${r.starved_events===1?'':'s'}</div>`}
function verifySummary(c){const ev=c.verify_events||[];if(!ev.length)return '';
  const last=ev[ev.length-1];const mark=last.ok?'✓':'✗';
  return `<div class="dim" style="font-size:11px">${mark} last check ${esc((last.at||'').slice(0,10))} · ${ev.length} check${ev.length>1?'s':''} · <a href="#" onclick="verifyHistory(${c.id});return false" style="color:var(--act)">history</a></div>`}
async function verifyHistory(id){const c=await api('GET','/api/chunks/'+id);const ev=c.verify_events||[];
  let h=`<h1>Verify history — ${esc(c.name)}</h1>`;
  if(!ev.length)h+='<div class="empty">No verification events recorded yet.</div>';
  else{h+='<table><tr><th>When (UTC)</th><th>Level</th><th>Result</th><th>Note</th><th>Path</th></tr>';
    for(const e of [...ev].reverse()){const lv=e.level||'B';const ln=(VLEVELS[lv]||{}).name||lv;
      h+=`<tr><td class="mono" style="font-size:11px">${esc((e.at||'').replace('T',' ').slice(0,19))}</td>
      <td><span class="etag" style="border:1px solid ${e.advisory?'var(--warn)':'var(--ok)'};color:${e.advisory?'var(--warn)':'var(--ok)'}">${lv}, ${esc(ln.toLowerCase())}</span></td>
      <td>${e.ok?'<span class="stamp VERIFIED">OK</span>':'<span class="stamp FAILED">FAIL</span>'}</td>
      <td>${esc(e.note||'')}</td><td class="mono dim" style="font-size:10.5px">${esc(e.path||'')}</td></tr>`}
    h+='</table>'}
  dlg(h,async()=>{})}
/* ---- tiered verification levels (A census · B full · C sample) ----
   Only Level B satisfies protection requirements; A/C are advisory. Package
   payloads and write read-back are ALWAYS B — no selector there. */
const VLEVELS={
  A:{name:'Census',checks:'file exists + size matches catalog',cost:'seconds/TB',complete:false},
  B:{name:'Full',checks:'complete content hash equals catalog hash',cost:'full read',complete:true},
  C:{name:'Sample',checks:'exists + size + hash of first and last 4 MiB',cost:'fast',complete:false},
};
function levelBlurbText(l){const v=VLEVELS[l]||VLEVELS.B;
  return `${v.name}: ${v.checks} · cost: ${esc(v.cost)} · ${v.complete?'<b>satisfies protection (COMPLETE)</b>':'advisory only — cannot mark COMPLETE or refresh verify-due'}`}
function levelBlurb(id){const el=document.getElementById(id),b=document.getElementById(id+'_blurb');if(el&&b)b.innerHTML=levelBlurbText(el.value)}
function levelSelectorHTML(id){return `<label>Verification level (only B satisfies protection)</label>
  <select id="${id}" class="full" onchange="levelBlurb('${id}')">
    <option value="B" selected>B — Full (content hash) · satisfies protection</option>
    <option value="C">C — Sample (first &amp; last 4 MiB) · advisory</option>
    <option value="A">A — Census (exists + size) · advisory</option>
  </select>
  <div id="${id}_blurb" class="dim" style="font-size:11px;margin-top:3px">${levelBlurbText('B')}</div>`}
// Name a copy's verify state, always with its level — "verified (B, full)" (green)
// vs "checked (C, sample)" (amber, advisory).
function copyVerifyLabel(cp){const lvl=cp.last_check_level||'B';const ln=(VLEVELS[lvl]||{}).name||lvl;
  const laterAdvisory=lvl!=='B'&&cp.last_check_at&&(!cp.last_verified_at||cp.last_check_at>cp.last_verified_at);
  if(cp.verify_ok===true){let s=`<span style="color:var(--ok)">✓ verified (B, full)${cp.last_verified_at?' · '+cp.last_verified_at.slice(0,10):''}</span>`;
    if(laterAdvisory)s+=` <span style="color:var(--warn)">· checked (${lvl}, ${esc(ln.toLowerCase())}) ${cp.last_check_at.slice(0,10)}</span>`;
    return s}
  if(cp.verify_ok===false)return `<span style="color:var(--bad)">✗ FAILED (B, full)${cp.last_verified_at?' · '+cp.last_verified_at.slice(0,10):''}</span>`;
  if(cp.last_check_ok===true)return `<span style="color:var(--warn)">checked (${lvl}, ${esc(ln.toLowerCase())})${cp.last_check_at?' · '+cp.last_check_at.slice(0,10):''} — advisory, not COMPLETE</span>`;
  if(cp.last_check_ok===false)return `<span style="color:var(--bad)">✗ ${lvl} check failed${cp.last_check_at?' · '+cp.last_check_at.slice(0,10):''}</span>`;
  return '<span class="dim">not verified</span>'}
function verifyCampaignDlg(){dlg(`<h1>Verify a medium</h1>
  <div class="dim" style="margin-bottom:8px">Insert the tape/disc (or point at an archive folder); every cataloged package found on it is re-checked against its recorded hash. Package payloads are ALWAYS full (B); the level below governs any <b>mirror</b> files on the medium. Read-only — nothing is written.</div>
  <label>Mounted medium / folder to scan</label><input id="d1" class="full" placeholder="T:\\  or  E:\\  or  /mnt/ltfs">${browseBtn('d1')}
  ${levelSelectorHTML('vcl')}
  <div class="row" style="margin-top:16px"><button class="btn" onclick="go()">Verify everything found</button></div>`,
  async()=>{const d=$('#d1').value.trim();if(!d)return;
    await api('POST','/api/verify-campaign',{dest_dir:d,level:$('#vcl').value});toast('Verify campaign started — see Jobs');loc('jobs')})}

let _lampBusy=false;
async function lamp(){if(_lampBusy)return;_lampBusy=true;try{const p=await api('GET','/api/preflight');const l=$('#lamp');
  l.className='lamp '+(p.ok?'ok':'bad');
  l.querySelector('span').textContent=p.ok?'tar · gpg · par2 · keys ready':'setup needed — see Settings';
}catch(e){}finally{_lampBusy=false}}

/* ---------------- Protection profiles & the six-status model ----------------
   The real 3-2-1 rule has THREE dimensions: copies, distinct media kinds, and
   offsite copies. A file's status is derived against its RESOLVED profile across
   all three. HARD UI RULE: a status is ALWAYS color + icon + text together —
   never color alone. */
const PROT={
  COMPLETE:{c:'var(--ok)',t:'Complete'},
  OVER_COMPLETE:{c:'var(--blue)',t:'Over-complete'},
  PARTIAL:{c:'var(--warn)',t:'Partial'},
  NOT_BACKED_UP:{c:'var(--bad)',t:'Not backed up'},
  OUT_OF_POLICY:{c:'var(--purple)',t:'Out of policy'},
  UNASSIGNED:{c:'var(--idle)',t:'Unassigned'},
};
const PROT_ORDER=['COMPLETE','OVER_COMPLETE','PARTIAL','NOT_BACKED_UP','OUT_OF_POLICY','UNASSIGNED'];
// The status "shape" — a CSS-drawn dot in the status colour (never an OS emoji).
// Every status is ALWAYS colour + this dot + a text label (the color+shape+text rule).
function dot(c){return `<span aria-hidden="true" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${c};flex:0 0 auto"></span>`}
function protBadge(st,detail){const p=PROT[st]||PROT.UNASSIGNED;
  return `<span class="protbadge" style="border-color:${p.c};color:${p.c}">${dot(p.c)} ${p.t}${detail?` · <span style="opacity:.85">${esc(detail)}</span>`:''}</span>`}
function reqStr(p){return `${p.required_copies} cop${p.required_copies===1?'y':'ies'} · ${p.required_distinct_media_kinds} media kind${p.required_distinct_media_kinds===1?'':'s'} · ${p.required_offsite_copies} offsite`}
const COUNTS_NOTE='<div class="dim" style="font-size:11.5px;margin-bottom:12px">Only <b>Level-B (full-content) verified</b> copies count toward requirements — a written-but-unverified copy, or one checked only at the advisory A/C levels, does not close a gap.</div>';
/* Surface recompute deltas from any profile/assignment/offsite change — never silent. */
function recomputeToast(r){if(!r)return;const d=(r.recompute&&r.recompute.deltas)||r.deltas||{};const parts=[];
  if(d.PARTIAL)parts.push(`${d.PARTIAL} newly Partial`);
  if(d.OUT_OF_POLICY)parts.push(`${d.OUT_OF_POLICY} newly Out-of-policy`);
  if(d.NOT_BACKED_UP)parts.push(`${d.NOT_BACKED_UP} newly Not-backed-up`);
  toast(parts.length?('Protection recomputed — '+parts.join(' · ')):'Protection recomputed',parts.length>0);}
/* Six-count strip — the canonical dashboard read of the model. */
function protStrip(totals){const t=totals||{};
  if(!PROT_ORDER.some(s=>t[s]))return '';
  let h='<div class="protrow" role="group" aria-label="protection status counts">';
  for(const s of PROT_ORDER){const p=PROT[s];

/* ---------------- Treemap — "where is my risk" (WizTree colored by risk) ------
   A squarified treemap on a canvas: area = bytes, fill = the six protection
   colors (or drift state). Computed from the catalog only — never the disk. One
   zoom level per request; click a folder to zoom in, breadcrumb to zoom out. */
const PROT_HEX={COMPLETE:'#2e5e4e',OVER_COMPLETE:'#1e3d8f',PARTIAL:'#9a6b1f',NOT_BACKED_UP:'#a03123',OUT_OF_POLICY:'#6b2d86',UNASSIGNED:'#8a938c'};
const DRIFT={UNCHANGED:{c:'#2e5e4e',t:'Unchanged'},MOVED:{c:'#1e3d8f',t:'Moved'},NEW:{c:'#8a938c',t:'Unarchived'},MODIFIED:{c:'#9a6b1f',t:'Modified'},MISSING:{c:'#a03123',t:'Missing'}};

/* HARD UI RULE: status is ALWAYS color + shape + text together — never color alone.
   The shape is a CSS dot (see dot()); the treemap tiles use the colored rect itself. */
function tmStyle(mode,st){
  if(mode==='drift'){const d=DRIFT[st]||DRIFT.UNCHANGED;return {c:d.c,t:d.t};}
  const p=PROT[st]||PROT.UNASSIGNED;return {c:PROT_HEX[st]||PROT_HEX.UNASSIGNED,t:p.t};

function tmLegend(res,mode){
  const sb=res.status_bytes||{}; const total=res.size||1;
  const rows=tmOrder(mode).filter(st=>sb[st]).map(st=>{const s=tmStyle(mode,st);
    const pct=(sb[st]/total*100);
    return `<span class="row" style="gap:6px;align-items:center;font-size:11.5px;margin-right:14px">

      ${s.t} <span class="dim">${tmBytes(sb[st])} · ${pct<0.1?'<0.1':pct.toFixed(pct<10?1:0)}%</span></span>`;}).join('');
  return `<div class="row" style="flex-wrap:wrap;margin-top:10px;row-gap:6px">${rows||'<span class="dim">no files at this level</span>'}</div>`;
}
function tmSetColor(color){_tm.color=color;vArchiveTreemap(_tm.cid,color);}
function tmZoom(path){_tm.path=path;vArchiveTreemap(_tm.cid,_tm.color);}
/* squarified treemap layout (Bruls, Huizing & van Wijk) */
function tmSquarify(data,X,Y,W,H){
  const res=[]; const items=data.filter(d=>d.size>0).slice().sort((a,b)=>b.size-a.size);
  const total=items.reduce((s,i)=>s+i.size,0);
  if(total<=0||W<=0||H<=0)return res;
  const scale=W*H/total; const arr=items.map(d=>({node:d.node,a:d.size*scale}));
  let x=X,y=Y,w=W,h=H;
  const worst=(rmax,rmin,s,len)=>Math.max(len*len*rmax/(s*s),s*s/(len*len*rmin));
  function placeRow(row){const s=row.reduce((a,b)=>a+b.a,0);if(s<=0)return;
    if(w>=h){const thick=s/h;let oy=y;for(const c of row){const ih=c.a/thick;res.push({node:c.node,x,y:oy,w:thick,h:ih});oy+=ih;}x+=thick;w-=thick;}
    else{const thick=s/w;let ox=x;for(const c of row){const iw=c.a/thick;res.push({node:c.node,x:ox,y,w:iw,h:thick});ox+=iw;}y+=thick;h-=thick;}}
  let i=0,row=[],rowSum=0,rmax=0,rmin=Infinity;
  while(i<arr.length){const c=arr[i],len=Math.min(w,h);
    const nrmax=Math.max(rmax,c.a),nrmin=Math.min(rmin,c.a);
    if(row.length===0||worst(nrmax,nrmin,rowSum+c.a,len)<=worst(rmax,rmin,rowSum,len)){row.push(c);rowSum+=c.a;rmax=nrmax;rmin=nrmin;i++;}
    else{placeRow(row);row=[];rowSum=0;rmax=0;rmin=Infinity;}}
  placeRow(row);return res;
}
function tmLum(hex){const n=parseInt(hex.slice(1),16);const r=(n>>16)&255,g=(n>>8)&255,b=n&255;return (0.299*r+0.587*g+0.114*b)/255;}
function tmDraw(){
  const cv=$('#tmcanvas');if(!cv||!_tm.res)return;
  const dpr=window.devicePixelRatio||1; const cssW=cv.clientWidth,cssH=cv.clientHeight;
  cv.width=Math.max(1,Math.round(cssW*dpr));cv.height=Math.max(1,Math.round(cssH*dpr));
  const ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,cssW,cssH);
  const mode=_tm.res.color_by||'protection';
  const data=(_tm.res.children||[]).map(n=>({node:n,size:n.size}));
  const rects=tmSquarify(data,1,1,cssW-2,cssH-2);
  _tm.rects=rects;
  ctx.font='12px system-ui,sans-serif';ctx.textBaseline='top';
  for(const r of rects){const n=r.node;const s=tmStyle(mode,n.status);
    ctx.fillStyle=s.c;ctx.fillRect(r.x,r.y,r.w,r.h);
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=1;ctx.strokeRect(r.x+.5,r.y+.5,r.w-1,r.h-1);
    if(r.w>52&&r.h>22){const light=tmLum(s.c)>0.6;ctx.fillStyle=light?'#1c241f':'#f4f6f4';
      const label=n.name;
      ctx.save();ctx.beginPath();ctx.rect(r.x+4,r.y+3,r.w-8,r.h-6);ctx.clip();
      ctx.fillText(label,r.x+5,r.y+4);
      if(r.h>38){ctx.globalAlpha=.85;ctx.fillText(tmBytes(n.size),r.x+5,r.y+19);ctx.globalAlpha=1;}
      ctx.restore();}}
  // interactions
  cv.onmousemove=e=>{const b=cv.getBoundingClientRect();const mx=e.clientX-b.left,my=e.clientY-b.top;
    const hit=_tm.rects.find(r=>mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h);
    const tip=$('#tmtip');if(!tip)return;
    if(!hit){tip.style.display='none';cv.style.cursor='default';return;}
    const n=hit.node,s=tmStyle(mode,n.status);
    cv.style.cursor=(n.is_dir&&n.has_children)?'zoom-in':'default';
    tip.innerHTML=`<div style="font-weight:600;margin-bottom:2px">${n.other?'other (folded tiny folders)':esc(n.name)}</div>
      <div>${tmBytes(n.size)}${n.is_dir?` · ${n.files.toLocaleString()} files`:''}</div>
      <div class="row" style="gap:6px;align-items:center;margin-top:3px">
        <span style="width:10px;height:10px;border-radius:2px;background:${s.c};display:inline-block"></span>
        ${s.t}${n.is_dir?' <span style="opacity:.7">(worst in folder)</span>':''}</div>`;
    tip.style.display='block';
    let tx=mx+14,ty=my+14;const tw=tip.offsetWidth,th=tip.offsetHeight;
    if(tx+tw>cssW)tx=mx-tw-14;if(ty+th>cssH)ty=my-th-14;

  cv.onmouseleave=()=>{const t=$('#tmtip');if(t)t.style.display='none';};
  cv.onclick=e=>{const b=cv.getBoundingClientRect();const mx=e.clientX-b.left,my=e.clientY-b.top;
    const hit=_tm.rects.find(r=>mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h);
    if(hit&&hit.node.is_dir&&hit.node.has_children)tmZoom(hit.node.path);};
}

/* ---------------- Integrity presets ----------------
   Unify the assurance knobs (build verify, par2, verify level, verify due,
   read-back) into ARCHIVAL / BALANCED / FAST without removing control. */
const IV_BV={full:'contents + round-trip',contents:'contents only',none:'none (amber)'};
const IV_ROWS=[
  {k:'build_verify',label:'Build verify',fmt:v=>IV_BV[v]||v},
  {k:'par2_redundancy',label:'par2 redundancy',fmt:v=>v+'%'},
  {k:'routine_verify_level',label:'Routine verify level',fmt:v=>v==='B'?'B (full)':'C (sample)'},
  {k:'verify_due_months',label:'Verify due',fmt:v=>v+' months'},
  {k:'readback',label:'Read-back after write',fmt:()=>'always'},
];
const IV_ONELINERS={
  ARCHIVAL:'Proves the tar contains your files AND decrypts back — nothing on faith. For anything irreplaceable.',
  BALANCED:'Proves the tar contains your files; routine re-checks sample the ends, going full on the due date.',
  FAST:'Skips proving the tar contains your files — packages could preserve a mistake. Only for re-creatable data.',
};
function ivRank(bv){return bv==='full'?3:bv==='contents'?2:1}
function ivColor(preset){return preset==='FAST'?'var(--warn)':preset==='Custom'?'var(--ink-3)':'var(--act)'}
function integrityTable(data,active){
  const presets=data.presets||[];
  let h='<div style="overflow-x:auto"><table><tr><th>Setting</th>';
  for(const p of presets)h+=`<th style="text-align:center;${p.name===active?'color:var(--act)':''}">${p.name}${p.name===active?' ✓':''}</th>`;
  h+='</tr>';
  for(const row of IV_ROWS){
    h+=`<tr><td class="dim">${row.label}</td>`;
    for(const p of presets){
      const val=row.k==='readback'?'always':p[row.k];
      const on=p.name===active;const amber=row.k==='build_verify'&&p.build_verify==='none';
      h+=`<td class="num" style="text-align:center;${on?'background:#2e5e4e14;font-weight:600;':''}${amber?'color:var(--warn);':''}">${esc(String(row.fmt(val)))}</td>`;
    }
    h+='</tr>';
  }
  return h+'</table></div>';
}

function ivConfirmLower(targetBV,curBV,label){

}

/* ---------------- Format sustainability census ----------------
   Tiers rate a FORMAT's long-term readability (documented? independent open
   readers?) — never the vendor's health, never a suggestion to delete anything.
   Colours map to the palette: OPEN green, DOCUMENTED amber-muted, AT-RISK amber,
   UNKNOWN gray. */
const FMT_TIER={
  'OPEN':{c:'var(--ok)',t:'Open',fill:false},
  'DOCUMENTED-PROPRIETARY':{c:'#8a6d10',t:'Documented',fill:false},
  'AT-RISK':{c:'var(--warn)',t:'At-risk',fill:true},
  'UNKNOWN':{c:'var(--idle)',t:'Unknown',fill:false},
};
const FMT_ORDER=['OPEN','DOCUMENTED-PROPRIETARY','AT-RISK','UNKNOWN'];
function fmtBadge(tier){const p=FMT_TIER[tier]||FMT_TIER.UNKNOWN;
  return p.fill?`<span class="protbadge" style="border-color:${p.c};background:${p.c};color:#fff">${p.t}</span>`
    :`<span class="protbadge" style="border-color:${p.c};color:${p.c}">${p.t}</span>`}
function censusBar(c){const tb=c.tier_bytes||{};const tot=c.total_bytes||1;
  let h='<div style="display:flex;height:10px;border-radius:5px;overflow:hidden;border:1px solid var(--line)">';
  for(const t of FMT_ORDER){const b=tb[t]||0;if(!b)continue;const p=FMT_TIER[t];const pct=b/tot*100;
    h+=`<div title="${p.t}: ${GB(b)} GB (${pct.toFixed(0)}%)" style="width:${pct}%;background:${p.c}${p.fill?'':'99'}"></div>`}
  return h+'</div>'}
function censusSummary(c){return `<b>${(c.safe_pct||0).toFixed(0)}%</b> of bytes in OPEN/DOCUMENTED formats <span class="dim">— readable with independent open-source tools</span>`}
async function censusDlg(cid,name){

    <td>${fmtBadge(r.tier)}</td><td class="dim" style="font-size:11px">${esc(r.rationale||'')}${(r.readers&&r.readers.length)?`<div>readers: ${esc(r.readers.join(', '))}</div>`:''}${r.migration?`<div style="color:var(--warn)">→ ${esc(r.migration)}</div>`:''}</td></tr>`;

function clip(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s}
// The getting-started checklist, SCOPED to the setup answers (st = GET /api/setup).
// A tape user sees "install the LTFS driver"; a drive-only user never hears about tape.
// The first-archive step follows the chosen archive kind (sourced folder vs adopt-a-drive).
function gettingStarted(cfg,pre,archives,pkgs,st){
  const ok=x=>x&&x.ok;
  const tools=ok(pre.tar)&&ok(pre.gpg)&&ok(pre.par2);
  const staging=!!(cfg.staging_dir);
  const keystores=ok(pre.keystores);
  const hasArchive=archives.length>0;
  const hasScan=archives.some(a=>(a.files||0)>0);
  const built=pkgs.some(c=>c.staged_dir||['STAGED','WRITING','WRITTEN','VERIFIED'].includes(c.status));
  const verified=pkgs.some(c=>verifiedCopies(c)>0);
  const p6=pkgs.length?['packages','Go to Packages →']:['vault','Go to Vault →'];
  const reqs=(st&&st.requirements)||[];
  const wants=t=>reqs.some(r=>r.target===t);
  const sourceless=(st&&st.archive_kind)==='SOURCELESS';
  const items=[
    ['Install the three tools','tar · gpg · par2 — the entire restore story. Preflight in Settings checks them.',tools,'settings','Open Settings →'],
  ];
  // Per-target install steps — only for what the user said they'd back up TO.
  for(const r of reqs){
    if(!r.checklist_step)continue;
    let done=false;
    if(r.target==='tape')done=!!(pre.ltfs&&pre.ltfs.mounted);
    else if(r.target==='optical')done=ok(pre.dvdisaster)||!!(cfg.burn_command);
    const link=r.link_url?` <a href="${esc(r.link_url)}" target="_blank" rel="noopener">${esc(r.link_text||'install')} →</a>`:'';
    items.push([r.checklist_step,r.need+link,done,'settings','Open Settings →']);
  }
  items.push(
    ['Set a staging folder','Big, fast scratch space where packages are built before being written to media.',staging,'settings','Open Settings →'],
    ['Register 2 keystores','On different devices. Encrypted builds refuse to run without them; secrets never touch the catalog.',keystores,'keys','Open Keys →'],
    sourceless
      ? ['Create your first archive','A scattered-drives archive — it has no source folder; its files come from the drives you adopt into it.',hasArchive,'vault','Go to Vault →']
      : ['Create your first archive','A body of work you keep together — e.g. "Personal" or "Client Work". It has a source folder you scan.',hasArchive,'vault','Go to Vault →'],
    sourceless
      ? ['Adopt a drive into it','Plug in a drive; Mnemosyne hashes every file and records what it holds — no source folder needed.',hasScan,'dock','Inventory drives →']
      : ['Scan a folder into it','Reads every file in the folder and records a unique fingerprint of each — the start of the safety trail.',hasScan,'vault','Go to Vault →'],
    ['Plan & build a package','Group files into a disc- or tape-sized set, then build it into one sealed, repairable, encrypted bundle.',built,p6[0],p6[1]]
  );
  // The write step names only the media the user picked.
  const targetNames=reqs.map(r=>r.label).filter(Boolean);
  const toWhere=targetNames.length?targetNames.join(', '):'a tape, drive, or disc';
  items.push(['Write a verified copy',`Stream to ${toWhere} with read-back verification, then register the volume.`,verified,'packages','Go to Packages →']);

  let h=hdr('Getting started','your setup, one step at a time — scoped to what you told us','home');
  // A short recap of the setup choices, with a re-run link.
  if(st){
    const tmpl=st.template?`${esc(st.template)} template`:'';
    h+=`<div class="purpose" style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
      <span style="flex:1">Set up for <b>${esc((cfg.data_kind||'mixed'))}</b>${tmpl?' · '+tmpl:''} · backing up to <b>${esc(toWhere)}</b>.</span>
      <button class="btn ghost" style="font-size:11px;padding:3px 10px" onclick="startSetup(true)">Run setup again</button></div>`;
  }
  h+=modePicker();
  h+=`<div class="panel"><div class="dim" style="margin-bottom:6px">Each step detects its own state. Do them roughly in order; click through to the exact spot.</div>`;
  let n=0;
  for(const [t,d,done,target,label] of items){ n++;
    h+=`<div class="chk${done?' done':''}"><div class="mk" aria-hidden="true">${done?'✓':n}</div>
      <div class="bd"><div class="t">${t}${done?' <span class="sr">(done)</span>':''}</div><div class="d">${d}</div>
      ${done?'':`<div style="margin-top:7px"><button class="btn" onclick="loc('${target}')">${label}</button></div>`}</div></div>`;
  }
  return h+'</div>';
}

// Five short, skippable questions that replace the cold start. Answers live only in
// _setup until the final POST /api/setup, which configures a coherent state and returns
// the summary + scoped checklist facts. Re-runnable from Settings and this checklist.
let _setup=null;
// Live requirement previews for Q3 (mirrors setup.go requirementFor for immediacy; the
// authoritative copy comes back from the server for the summary + checklist).
const SETUP_REQ={
  drives:{label:'External drives',need:'No extra software — verified copies write straight to any drive.'},

const SETUP_Q1=[

  ['video','Video / film','Footage, projects, and deliverables','Filmmaker template'],

async function startSetup(fromSettings,cfg){
  // When re-run (no cfg handed in), prefill from the saved answers so the wizard
  // reflects the current configuration rather than blank defaults.
  if(!cfg){try{const c=await api('GET','/api/config');cfg=(c&&c.config)||{};}catch(e){cfg={};}}
  _setup={step:1,fromSettings:!!fromSettings,
    data_kind:cfg.data_kind||'photos',
    primary_location:cfg.primary_location||'nas',
    backup_targets:(cfg.backup_targets&&cfg.backup_targets.length)?cfg.backup_targets.slice():['drives'],
    ui_mode:cfg.ui_mode||_uiMode||'guided',
    integrity_preset:'ARCHIVAL'};
  renderSetup();
}
function setupPick(field,val){_setup[field]=val;renderSetup();}
function setupToggleTarget(val){const a=_setup.backup_targets;const i=a.indexOf(val);
  if(i>=0){if(a.length>1)a.splice(i,1);}else a.push(val);renderSetup();}
function setupNav(delta){const n=_setup.step+delta;if(n<1)return;if(n>5){finishSetup();return;}_setup.step=n;renderSetup();}
async function skipSetup(){
  try{const res=await api('POST','/api/setup',{skipped:true});applyNavExpanded(res.nav_expanded);
    toast('Setup skipped — sensible defaults applied. Re-run it anytime from Settings.');
    if(_setup&&_setup.fromSettings){_setup=null;loc('settings');}else{_setup=null;loc('home');}
  }catch(e){toast(e.message,1)}
}
async function finishSetup(){
  const s=_setup;
  try{const res=await api('POST','/api/setup',{
      data_kind:s.data_kind,primary_location:s.primary_location,
      backup_targets:s.backup_targets,ui_mode:s.ui_mode,integrity_preset:s.integrity_preset});
    if(res.config&&res.config.ui_mode)_uiMode=res.config.ui_mode;
    applyNavExpanded(res.nav_expanded);

}
// Open the nav groups the location answer says the user lives in (others keep their
// situational default). Purely presentational, stored in the same place manual toggles are.
function applyNavExpanded(groups){
  if(!groups||!groups.length)return;
  const st=navCollapsedState();
  for(const id of groups)st[id]=false;

}
function renderSetup(){
  const s=_setup,step=s.step;
  // Option cards are div[role=button] (not <button>) so Q3's cards can legally hold an
  // install <a>; Enter/Space activate them for keyboard users. onAttr is injected as the
  // first attribute of the outer <div>.
  const kd=`onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click()}"`;
  const card=(onAttr,on,multi,title,desc,need)=>`<div ${onAttr} role="button" tabindex="0" aria-pressed="${on}" ${kd} class="opt${on?' on':''}${multi?' multi':''}">
    <span class="box">${on?(multi?'✓':''):''}</span>
    <span style="flex:1"><span class="ot">${title}</span>${desc?`<span class="od">${desc}</span>`:''}${need||''}</span></div>`;
  let title,q,opts='';
  if(step===1){title='What kind of data are you protecting?';q='Sets a starting organization template and the words the app uses (events, sessions, projects).';
    opts=SETUP_Q1.map(([v,t,d,tm])=>card(`onclick="setupPick('data_kind','${v}')"`,s.data_kind===v,false,esc(t),esc(d)+' · '+esc(tm))).join('');
  }else if(step===2){title='Where does it mainly live right now?';q='Sets whether new archives start with a source folder, and which parts of the app open first.';
    opts=SETUP_Q2.map(([v,t,d])=>card(`onclick="setupPick('primary_location','${v}')"`,s.primary_location===v,false,esc(t),esc(d))).join('');
  }else if(step===3){title='What will you back up TO?';q='Pick every kind of media you’ll use. We’ll show what each needs and hide the rest.';
    opts=SETUP_Q3.map(v=>{const r=SETUP_REQ[v];const on=s.backup_targets.includes(v);
      const link=r.link_url?` · <a href="${esc(r.link_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(r.link_text)} →</a>`:'';
      const need=on?`<span class="oneed">${esc(r.need)}${link}</span>`:'';
      return card(`onclick="setupToggleTarget('${v}')"`,on,true,esc(r.label),'',need);}).join('');
  }else if(step===4){title='How much guidance do you want?';q='Changes only what’s shown and how much is explained — never your data or how the app works. Switch anytime.';
    opts=SETUP_Q4.map(([v,t,d])=>card(`onclick="setupPick('ui_mode','${v}')"`,s.ui_mode===v,false,esc(t),esc(d))).join('');
  }else{title='How careful should checking be?';q='How hard each backup is proven before it counts. You can change this anytime, globally or per archive.';
    opts=SETUP_Q5.map(([v,t,d])=>card(`onclick="setupPick('integrity_preset','${v}')"`,s.integrity_preset===v,false,esc(t),esc(d))).join('');
  }

    <div class="acts">
      ${step>1?`<button class="btn ghost" onclick="setupNav(-1)">← Back</button>`:''}
      <div class="sp"></div>
      <button class="skip" onclick="skipSetup()">Skip setup</button>
      <button class="btn" onclick="setupNav(1)">${step<5?'Next →':'Finish setup ✓'}</button>

async function vDrift(id,name){

  <div class="panel"><h2>By file type — different types mean different things</h2>`;
  const rows=(d.by_ext||[]).filter(e=>!e.informational);const inf=(d.by_ext||[]).filter(e=>e.informational);

  else{h+='<table><tr><th>Type</th><th class="num">Missing</th><th class="num">Modified</th><th class="num" title="present on disk, not yet in any package">Unarchived</th><th class="num">Moved</th></tr>';
    for(const e of rows)h+=extRow(e);
    if(inf.length){h+='<tr><td colspan="5" class="dim" style="padding-top:8px">informational (sidecar churn — excluded from alarm totals)</td></tr>';for(const e of inf)h+=extRow(e,true);}
    h+='</table>'}
  h+='</div>';
  const items=d.items||[];

  const STATE_LABEL={MISSING:'MISSING',MODIFIED:'MODIFIED',NEW:'UNARCHIVED',MOVED:'MOVED'};

  for(const st of ['MISSING','MODIFIED','NEW','MOVED']){const list=items.filter(it=>it.state===st&&!it.informational);
    if(list.length)h+=`<div class="panel"><h2${STATE_HINT[st]?` title="${STATE_HINT[st]}"`:''}>${STATE_LABEL[st]} (${list.length})</h2>${itemList(list)}</div>`}

const DISC_CLS={DONE:'done',FAILED:'failed',BURNING:'active',VERIFYING:'active',PENDING:'pending'};
let burnTimer;
async function vBurn(){
  const [qs,cs]=await Promise.all([api('GET','/api/burnqueues'),api('GET','/api/chunks')]);
  const cmap={};for(const c of (cs||[]))cmap[c.id]=c;
  const nm=d=>{const c=cmap[d.chunk_id];return c?c.name:'package#'+d.chunk_id};
  const sz=d=>{const c=cmap[d.chunk_id];return c?GB(c.enc_bytes||c.data_bytes):'?'};
  let h=`${hdr('Burn','optical discs · one blank at a time · queue survives reboots','burn')}
  <div class="panel"><div class="row"><button class="btn" onclick="burnQueueDlg()">Create burn queue…</button>
    <span class="dim">Gathers every staged/written/verified package of one media kind, one disc each.</span></div></div>`;
  const list=(qs||[]).sort((a,b)=>b.id-a.id);
  let anyActive=false;
  if(!list.length)h+='<div class="panel"><div class="empty">No burn queues yet — a queue bundles packages of one media kind, one disc each.<div class="row" style="justify-content:center;margin-top:12px"><button class="btn" onclick="burnQueueDlg()">Create burn queue…</button></div></div></div>';
  for(const q of list){
    const discs=q.discs||[];
    const done=discs.filter(d=>d.status==='DONE').length;
    const failed=discs.filter(d=>d.status==='FAILED').length;
    const active=discs.find(d=>d.status==='BURNING'||d.status==='VERIFYING');
    const next=discs.find(d=>d.status==='PENDING');
    if(active)anyActive=true;
    h+=`<div class="panel"><div class="row" style="justify-content:space-between">
      <div><b>${esc(q.name)}</b> <span class="chip">${esc(q.media_kind)}</span></div>
      <div class="dim mono">${done}/${discs.length} burned${failed?` · ${failed} failed`:''}</div></div>`;
    h+='<div class="discs">';
    for(const d of discs)h+=`<div class="disc ${DISC_CLS[d.status]||'pending'}" role="img" aria-label="disc ${esc(nm(d))} ${esc(d.status)}" title="${esc(nm(d))} — ${esc(d.status)}${d.detail?': '+esc(d.detail):''}"></div>`;
    h+='</div>';
    for(const d of discs.filter(d=>d.status==='FAILED'))h+=`<div class="err">✗ ${esc(nm(d))}: ${esc(d.detail||'failed')}</div>`;
    if(active){
      h+=`<div class="dim">Burning <b>${esc(nm(active))}</b> — ${esc(active.status.toLowerCase())}… watch Jobs for progress.</div>`;
    }else if(next){
      const pos=discs.indexOf(next)+1;
      h+=`<div class="dim" style="margin:2px 0 10px">Next: <b>${esc(nm(next))}</b> (${sz(next)} GB). After it burns, <b>write “${esc(nm(next))}” on the disc</b> with a marker before moving on.</div>

    }else{
      h+=`<div class="dim" style="margin-bottom:8px">All discs burned ✓</div>`;
    }
    if(failed)h+=` <button class="btn ghost" onclick="doResetQueue(${q.id})">Retry failed discs (${failed})</button>`;
    h+='</div>';
  }
  $('#view').innerHTML=h;
  clearTimeout(burnTimer);
  if(anyActive)burnTimer=setTimeout(()=>{if(location.hash==='#burn')vBurn()},1500);
}

function ageStr(iso){if(!iso)return 'never';const d=new Date(iso);const days=Math.floor((Date.now()-d)/86400000);

  return when+` (${Math.round(days/30)}mo ago)`}
// Superseded copies are history of a failed-then-rewritten medium; they never

function currentCopies(c){return (c.copies||[]).filter(x=>!x.superseded)}
function verifiedCopies(c){return currentCopies(c).filter(x=>x.verify_ok===true).length}
function copyMark(v){return v===true?'✓':v===false?'✗':'?'}
function copyTag(c,required){const total=currentCopies(c).length;if(!total)return '';
  const vc=verifiedCopies(c);
  if(vc<required)return ` <span class="etag due" title="redundancy goal ${required}">under-protected (${vc} of ${required} copies)</span>`;
  return ` <span class="etag enc" title="redundancy goal ${required}">${vc} verified copies</span>`}
function copiesLine(c,volmap){const cur=currentCopies(c);const sup=(c.copies||[]).filter(x=>x.superseded);
  if(!cur.length&&!sup.length)return '';

    return s});
  let h=`<div class="dim" style="font-size:11px">copies: ${parts.join(' · ')||'<span class="dim">none current</span>'}</div>`;
  if(sup.length)h+=`<div class="dim" style="font-size:10.5px;opacity:.65">superseded: ${sup.map(cp=>{const v=volmap[cp.volume_id]||{};return esc(v.label||'vol#'+cp.volume_id)+' '+copyMark(cp.verify_ok)}).join(' · ')}</div>`;

/* Tape-drive diagnostics — OPTIONAL, strictly read-only toward the drive; never

   never replaces — hash verification. */
const TAPE_SEV={ok:'var(--ok)',clean:'var(--warn)',warn:'var(--warn)',error:'var(--bad)'};
function tapeSevBadge(sev){const map={ok:['VERIFIED','healthy'],clean:['due','cleaning'],warn:['due','warnings'],error:['FAILED','error']};
  const [cls,txt]=map[sev]||['due',sev];return `<span class="stamp ${cls==='VERIFIED'?'VERIFIED':cls==='FAILED'?'FAILED':''}" style="color:${TAPE_SEV[sev]}">${esc(txt)}</span>`}
function tapeBytes(n){return n?GB(n)+' GB':'—'}
function tapeAlertsHtml(alerts){if(!alerts||!alerts.length)return '';
  return '<div style="margin-top:8px">'+alerts.map(f=>`<div style="display:flex;gap:8px;align-items:baseline;margin:3px 0">
    <span style="color:${TAPE_SEV[f.severity]||'var(--warn)'};font-weight:700"></span>
    <div><b>${esc(f.name)}</b> <span class="dim mono" style="font-size:10.5px">flag ${f.id}</span><div class="dim" style="font-size:11.5px">${esc(f.text||'')}</div></div></div>`).join('')+'</div>'}
function tapeHealthBody(th){
  let h=`<div class="row" style="gap:16px;flex-wrap:wrap;align-items:baseline">
    <div style="font-size:15px;font-weight:600;color:${TAPE_SEV[th.severity]||''}">${esc(th.summary||'')}</div></div>`;
  if(th.cleaning_recommended)h+=`<div style="margin-top:6px;color:var(--warn);font-weight:600">Cleaning cartridge recommended.</div>`;
  const stats=[];
  if(th.vendor||th.product)stats.push([th.vendor,th.product].filter(Boolean).join(' '));
  if(th.serial)stats.push('S/N '+th.serial);
  if(th.power_on_hours)stats.push((Math.round(th.power_on_hours/8.76)/1000)+' yr power-on');
  if(th.bytes_written)stats.push('written '+tapeBytes(th.bytes_written));
  if(th.bytes_read)stats.push('read '+tapeBytes(th.bytes_read));
  if(stats.length)h+=`<div class="dim mono" style="font-size:11.5px;margin-top:8px">${esc(stats.join(' · '))}</div>`;
  h+=tapeAlertsHtml(th.alerts);
  h+=`<div class="dim" style="font-size:11px;margin-top:10px">Read ${esc((th.at||'').replace('T',' ').slice(0,16))} via ${esc(th.tool||'')} on ${esc(th.device||'')}. Diagnostics only — Mnemosyne never issues movement or write commands. A drive signal, not a data-integrity guarantee: only the custody-chain hashes prove your bytes intact.</div>`;

}

async function loadVolSnapshot(id){

  let s;try{s=await api('GET','/api/volumes/'+id+'/snapshot')}catch(e){box.innerHTML='<div class="err">'+esc(e.message)+'</div>';return}
  if(!s.has_snapshot){box.style.display='none';return}
  const seen=(s.captured_at||'').slice(0,16).replace('T',' ');
  const rep=s.report||{};
  let h=`<div class="row" style="align-items:baseline;gap:10px"><h2 style="flex:1">Drive snapshot <span class="etag due" title="This drive may be unplugged — everything below is from the catalog snapshot">from snapshot · drive last seen ${esc(seen)}</span></h2></div>
    <div class="dim" style="font-size:12px;margin-bottom:8px">${commaN(s.total_files)} files · ${GB(s.total_bytes)} GB${s.unreadable?` · ${s.unreadable} unreadable`:''}${s.serial?` · S/N ${esc(s.serial)}`:''}. The full tree, hashes, dates &amp; roles are queryable with the drive back in the box.</div>`;
  // Report warnings (mirror / duplicate / critical-catalog).
  for(const n of (rep.notes||[])){const risk=/AT RISK/i.test(n);
    h+=`<div style="font-size:12.5px;margin:3px 0;color:${risk?'var(--bad)':'var(--ink-2)'}">${risk?'':'• '}${esc(n)}</div>`;}
  // Role breakdown bar.
  if((rep.roles||[]).length){h+=`<div style="margin:10px 0">`;
    const tot=s.total_bytes||1;
    h+=`<div style="display:flex;height:10px;border-radius:3px;overflow:hidden;border:1px solid var(--line)">`+
      (rep.roles||[]).map(r=>`<div title="${esc(r.role)} · ${commaN(r.files)} files · ${GB(r.bytes)} GB" style="width:${Math.max(0.5,r.bytes/tot*100)}%;background:${ROLE_COLOR[r.role]||'var(--ink-3)'}"></div>`).join('')+`</div>`;
    h+=`<div class="dim" style="font-size:11px;margin-top:5px">`+(rep.roles||[]).map(r=>`${roleDot(r.role)}${esc(r.role)} ${commaN(r.files)}${r.critical?' ':''}`).join(' &nbsp; ')+`</div></div>`;}
  h+=`<div id="snaptree" style="margin-top:8px"><div class="dim">Loading tree…</div></div>`;
  box.innerHTML=h;
  snapTree(id,'');
}
async function snapTree(id,path){
  const el=$('#snaptree');if(!el)return;
  let r;try{r=await api('GET','/api/volumes/'+id+'/treemap?path='+encodeURIComponent(path||''))}catch(e){el.innerHTML='<div class="err">'+esc(e.message)+'</div>';return}
  const crumbs=(r.crumbs||[]).map((c,i,arr)=>i===arr.length-1?`<b>${esc(c.name)}</b>`:`<a href="#" onclick="snapTree(${id},'${esc(c.path)}');return false" style="color:var(--act)">${esc(c.name)}</a>`).join(' <span class="dim">/</span> ');
  let h=`<div style="font-size:12px;margin-bottom:6px">${crumbs}</div>`;
  h+=`<table style="width:100%"><tr><th></th><th>Name</th><th class="num">Size</th><th class="num">Files</th></tr>`;
  for(const c of (r.children||[])){
    const nm=c.is_dir&&!c.other?`<a href="#" onclick="snapTree(${id},'${esc(c.path)}');return false" style="color:var(--act)">${esc(c.name)}/</a>`:esc(c.name)+(c.is_dir?'/':'');
    h+=`<tr><td style="width:16px">${roleDot(c.status)}</td><td>${nm}</td><td class="num dim">${GB(c.size)} GB</td><td class="num dim">${c.is_dir?commaN(c.files):''}</td></tr>`;}
  h+=`</table>`;
  if(r.folded)h+=`<div class="dim" style="font-size:11px;margin-top:4px">…${r.folded} smaller entr${r.folded===1?'y':'ies'} folded into “other”.</div>`;
  el.innerHTML=h;
}

  if(v.model)bits.push('model '+esc(v.model));

  if(v.device_note)h+=`<div class="etag due" style="margin-bottom:6px" title="${esc(v.device_note)}">Warning: serial via bridge — may be the enclosure's</div>`;
  return h}

function sealBanner(v){
  const seals=(v.finalizations||[]);
  if(!v.sealed){const last=seals.filter(f=>f.action==='UNSEALED').slice(-1)[0];
    return last?`<div class="panel" style="border-left:3px solid var(--warn)"><b>Unsealed</b> <span class="dim">· ${esc((last.at||'').slice(0,10))} by ${esc(last.by||'?')} — ${esc(last.force_reason||'')}. Writes are enabled; finalize again when the box is closed.</span></div>`:'';}
  const f=seals.filter(x=>x.action==='SEALED').slice(-1)[0]||{};
  return `<div class="panel" style="border-left:3px solid var(--blue)">
    <div style="font-size:15px;font-weight:600;color:var(--blue)">SEALED — vault-ready</div>
    <div class="dim" style="margin-top:3px">Sealed ${esc((v.sealed_at||f.at||'').slice(0,16).replace('T',' '))} by ${esc(f.by||'?')} · ${f.packages||0} package(s) · ${GB(f.bytes)} GB${f.forced?` · <span style="color:var(--bad)">Warning: FORCED: ${esc(f.force_reason||'')}</span>`:''}. Further writes are refused until an explicit, audit-logged unseal.</div></div>`;
}

/* Media health — SMART drive-mortality signals. A COMPLEMENT to hash
   verification, never a substitute: it flags a drive likely to die, not whether
   the bytes on it are intact. */
function smartMetric(label,val){return `<div style="min-width:96px"><div class="dim" style="font-size:10.5px">${label}</div><div style="font-size:15px">${val}</div></div>`}
function smartTrend(hist){if((hist||[]).length<2)return '';
  const a=hist[0],b=hist[hist.length-1];
  const d=((b.reallocated_sectors||0)+(b.pending_sectors||0))-((a.reallocated_sectors||0)+(a.pending_sectors||0));
  return d>0?` · <span style="color:var(--bad)">bad sectors +${d} since first read</span>`:''}
function mediaHealthCard(d){
  const v=d.volume, hist=v.smart_history||[], last=hist[hist.length-1];
  if(!last&&!d.smart_available)
    return `<div class="panel"><h2>Media health <span class="dim" style="font-weight:400;font-size:12px">· optional</span></h2><div class="dim" style="font-size:12px">${esc(d.smart_hint||'smartctl not installed.')}</div></div>`;
  if(!last)
    return `<div class="panel"><h2>Media health</h2><div class="dim" style="font-size:12px;margin-bottom:8px">No drive-mortality reading yet. SMART <b>complements</b> hash verification — it flags a drive likely to fail; it never proves your bytes intact.</div><button class="btn ghost" onclick="healthDlg(${v.id})">Check health now…</button></div>`;
  const passed=last.passed===true?'<span class="stamp VERIFIED">PASSED</span>':last.passed===false?'<span class="stamp FAILED">FAILING</span>':'<span class="dim">unknown</span>';
  const m=[smartMetric('SMART',passed)];
  if(last.temp_c)m.push(smartMetric('Temp',last.temp_c+' °C'));
  if(last.power_on_hours)m.push(smartMetric('Power-on',(Math.round(last.power_on_hours/8.76)/1000)+' yr'));
  m.push(smartMetric('Reallocated',last.reallocated_sectors||0));
  m.push(smartMetric('Pending',last.pending_sectors||0));
  if((last.type||'').indexOf('nvme')>=0){
    if(last.media_errors!=null)m.push(smartMetric('Media errors',last.media_errors));
    if(last.percent_used)m.push(smartMetric('Endurance used',last.percent_used+'%'));
    if(last.available_spare)m.push(smartMetric('Spare',last.available_spare+'%'));
  }
  let h=`<div class="panel"><h2>Media health <span class="dim" style="font-weight:400;font-size:12px">· ${esc(last.device||'')} ${esc(last.type||'')}</span></h2>`;
  if(last.advisory)h+=`<div class="err" style="margin-bottom:10px;font-weight:600">Warning: ${esc(last.advisory_why||'Migrate copies off this volume.')}</div>`;
  h+=`<div class="row" style="gap:16px;flex-wrap:wrap">${m.join('')}</div>`;
  h+=`<div class="dim" style="font-size:11px;margin-top:10px">Last read ${esc((last.at||'').replace('T',' ').slice(0,16))} · ${hist.length} reading${hist.length>1?'s':''} on record${smartTrend(hist)}</div>`;
  h+=`<div class="dim" style="font-size:11px;margin-top:4px">SMART is a <b>mortality signal</b>: it flags a drive likely to <i>die</i>, not whether your bytes are intact — only the custody-chain hashes prove that. Complement, never substitute.</div>`;
  h+=`<div style="margin-top:10px"><button class="btn ghost" onclick="healthDlg(${v.id})">Re-check now…</button></div>`;
  return h+'</div>';
}
