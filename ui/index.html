<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mnemosyne</title>
<style>
:root{
  --ink:#1c241f; --ink-2:#4a544e; --ink-3:#7d857f;
  --bg:#e7eae6; --panel:#fcfcfa; --line:#c9cfc9; --line-2:#e2e5e0;
  --act:#2e5e4e; --act-ink:#f2f5f2;
  --ok:#2e5e4e; --warn:#9a6b1f; --bad:#a03123; --idle:#8a938c;
  --mono:ui-monospace,'Cascadia Mono','JetBrains Mono',Menlo,Consolas,monospace;
  --sans:system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box} html,body{margin:0;height:100%}
body{font:14px/1.5 var(--sans);color:var(--ink);background:var(--bg);display:flex}
button{font:inherit;cursor:pointer}
input,select{font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:3px;padding:6px 8px}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--act);outline-offset:1px}

/* ---- sidebar: drawer labels ---- */
nav{width:212px;min-height:100vh;background:var(--ink);color:#cfd6d0;padding:22px 0;flex-shrink:0}
.wordmark{font:700 15px/1 var(--mono);letter-spacing:.42em;color:#f2f5f2;padding:0 22px 6px}
.wordsub{font:11px/1.4 var(--mono);color:#8fa398;padding:0 22px 20px;letter-spacing:.08em}
nav a{display:block;padding:10px 22px;color:#cfd6d0;text-decoration:none;font-size:13.5px;
  border-left:3px solid transparent}
nav a:hover{background:#28352f}
nav a.on{background:#28352f;color:#fff;border-left-color:#b9c8bf}
nav .lamp{margin:26px 22px 0;padding:10px 12px;border:1px solid #3a4a42;border-radius:4px;
  font:11.5px var(--mono);color:#9fb2a7}
nav .lamp b{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:1px}
nav .lamp.ok b{background:#6fbf9a}.lamp.bad b{background:#e08573}

/* ---- main ---- */
main{flex:1;min-width:0;padding:28px 34px 60px;max-width:1160px}
h1{font:600 19px var(--sans);margin:0 0 4px}
.crumb{font:11px var(--mono);letter-spacing:.18em;color:var(--ink-3);text-transform:uppercase;margin-bottom:22px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:16px 18px;margin-bottom:16px}
.panel h2{font:600 13px var(--sans);margin:0 0 10px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.08em}
table{width:100%;border-collapse:collapse}
th{font:600 11px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);
  text-align:left;padding:6px 10px;border-bottom:1px solid var(--line)}
td{padding:8px 10px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tr:last-child td{border-bottom:none}
.mono{font:12.5px var(--mono)} .dim{color:var(--ink-3)} .num{text-align:right;font:12.5px var(--mono)}
.btn{background:var(--act);color:var(--act-ink);border:none;border-radius:3px;padding:7px 13px;font-size:13px}
.btn:hover{background:#254c3f}
.btn.ghost{background:transparent;color:var(--act);border:1px solid var(--act)}
.btn.ghost:hover{background:#2e5e4e14}
.btn[disabled]{opacity:.45;cursor:default}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{display:inline-block;font:11.5px var(--mono);border:1px solid var(--line);border-radius:2px;
  background:#fff;padding:1px 7px;letter-spacing:.04em}
.chip::before{content:"";display:inline-block;width:3px;height:9px;margin-right:6px;
  background:repeating-linear-gradient(90deg,var(--ink) 0 1px,transparent 1px 3px);vertical-align:-1px}
.stamp{font:11px var(--mono);letter-spacing:.06em;padding:2px 8px;border-radius:2px;color:#fff;display:inline-block}
.stamp.VERIFIED{background:var(--ok)} .stamp.FAILED{background:var(--bad)}
.stamp.PLANNED{background:var(--idle)} .stamp.STAGED,.stamp.WRITTEN{background:#5b7367}
.stamp.BUILDING,.stamp.WRITING{background:var(--warn)}
.err{color:var(--bad);font:12.5px var(--mono)}
.empty{color:var(--ink-3);padding:26px 10px;text-align:center;font-size:13.5px}

/* ---- signature: chunk lifecycle rail ---- */
.rail{display:flex;align-items:center;gap:0;min-width:190px}
.rail i{width:11px;height:11px;border:1.5px solid var(--idle);border-radius:2px;background:#fff;flex-shrink:0}
.rail s{flex:1;height:2px;background:var(--line);min-width:10px;text-decoration:none}
.rail i.done{background:var(--ok);border-color:var(--ok)}
.rail s.done{background:var(--ok)}
.rail i.now{border-color:var(--warn);background:var(--warn);animation:tick 1.1s steps(2) infinite}
.rail.dead i.done,.rail.dead i.now{background:var(--bad);border-color:var(--bad)}
.rail.dead s.done{background:var(--bad)}
@keyframes tick{50%{opacity:.35}}
@media (prefers-reduced-motion:reduce){.rail i.now{animation:none}}
.raillbl{font:10px var(--mono);color:var(--ink-3);letter-spacing:.1em;margin-top:3px}

.bar{height:6px;background:var(--line-2);border-radius:3px;overflow:hidden}
.bar div{height:100%;background:var(--act)}
#toast{position:fixed;right:20px;bottom:20px;max-width:420px;display:flex;flex-direction:column;gap:8px;z-index:9}
#toast div{background:var(--ink);color:#eef2ee;padding:10px 14px;border-radius:4px;font-size:13px}
#toast div.bad{background:var(--bad)}
dialog{border:1px solid var(--line);border-radius:6px;padding:20px 22px;max-width:520px;width:92%}
dialog::backdrop{background:#1c241f66}
label{display:block;font:600 12px var(--sans);color:var(--ink-2);margin:12px 0 4px}
.full{width:100%}
@media (max-width:760px){body{flex-direction:column}nav{width:100%;min-height:0;display:flex;flex-wrap:wrap;align-items:center}nav a{border-left:none}main{padding:18px}}
</style>
</head>
<body>
<nav>
  <div class="wordmark">MNEMOSYNE</div>
  <div class="wordsub">archival vault · v2</div>
  <a href="#vault" data-v="vault">Vault</a>
  <a href="#chunks" data-v="chunks">Chunks</a>
  <a href="#keys" data-v="keys">Keys</a>
  <a href="#jobs" data-v="jobs">Jobs</a>
  <a href="#settings" data-v="settings">Settings</a>
  <div class="lamp" id="lamp"><b></b><span>checking tools…</span></div>
</nav>
<main id="view"></main>
<div id="toast"></div>

<script>
const $=q=>document.querySelector(q);
const api=async(m,u,b)=>{const r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||r.statusText);return j};
const GB=n=>((n||0)/1e9).toFixed(2);
const toast=(m,bad)=>{const d=document.createElement('div');if(bad)d.className='bad';d.textContent=m;$('#toast').append(d);setTimeout(()=>d.remove(),bad?7000:3500)};
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const STAGES=['PLANNED','BUILDING','STAGED','WRITING','WRITTEN','VERIFIED'];
function rail(c){
  let idx=STAGES.indexOf(c.status); const dead=c.status==='FAILED';
  if(dead) idx=Math.max(1,STAGES.indexOf('STAGED')*(c.staged_dir?1:0)||1);
  if(c.status==='VERIFIED') idx=STAGES.length-1;
  let h='<div class="rail'+(dead?' dead':'')+'" title="'+esc(c.status)+'">';
  STAGES.forEach((s,i)=>{
    const cls=i<idx?'done':(i===idx?(c.status==='VERIFIED'?'done':'now'):'');
    h+='<i class="'+cls+'"></i>'+(i<STAGES.length-1?'<s class="'+(i<idx?'done':'')+'"></s>':'');
  });
  return h+'</div><div class="raillbl">'+esc(c.status)+(c.verify_ok===false?' · MEDIA CHECK FAILED':'')+'</div>';
}

async function lamp(){try{const p=await api('GET','/api/preflight');const l=$('#lamp');
  l.className='lamp '+(p.ok?'ok':'bad');
  l.querySelector('span').textContent=p.ok?'tar · gpg · par2 · keys ready':'setup needed — see Settings';
}catch(e){}}

/* ---------------- Vault (collections) ---------------- */
async function vVault(){
  const cs=await api('GET','/api/collections')||[];
  let h=`<h1>Vault</h1><div class="crumb">catalog · every file hashed at the source</div>
  <div class="panel"><div class="row">
    <input id="newname" placeholder="New collection name (e.g. Weddings 2025)" style="flex:1;min-width:220px">
    <button class="btn" onclick="addColl()">Create collection</button>
  </div></div>
  <div class="panel"><h2>Find a file → which chunk, which medium</h2>
    <div class="row"><input id="q" class="full" placeholder="Search cataloged file paths…" oninput="doSearch(this.value)"></div>
    <div id="sres"></div></div>`;
  h+='<div class="panel"><h2>Collections</h2>';
  if(!cs.length) h+='<div class="empty">No collections yet. Create one, then scan a folder into it.</div>';
  else{h+='<table><tr><th>Name</th><th class="num">Files</th><th class="num">Size</th><th class="num">Chunks</th><th></th></tr>';
    for(const c of cs) h+=`<tr><td>${esc(c.name)}</td><td class="num">${c.files}</td><td class="num">${GB(c.bytes)} GB</td>
      <td class="num">${c.chunks}</td><td class="row" style="justify-content:flex-end">
      <button class="btn ghost" onclick="scanDlg(${c.id},'${esc(c.name)}')">Scan folder…</button>
      <button class="btn ghost" onclick="planDlg(${c.id},'${esc(c.name)}')">Plan chunks…</button></td></tr>`;
    h+='</table>'}
  h+='</div>';
  $('#view').innerHTML=h;
}
async function addColl(){const n=$('#newname').value.trim();if(!n)return;
  try{await api('POST','/api/collections',{name:n});toast('Collection created');vVault()}catch(e){toast(e.message,1)}}
let sT;function doSearch(q){clearTimeout(sT);sT=setTimeout(async()=>{
  if(!q){$('#sres').innerHTML='';return}
  const rs=await api('GET','/api/search?q='+encodeURIComponent(q));
  let h='<table><tr><th>File</th><th class="num">Size</th><th>Chunk</th><th>On medium</th></tr>';
  for(const r of rs||[]) h+=`<tr><td class="mono">${esc(r.rel_path)}</td><td class="num">${GB(r.size_bytes)} GB</td>
    <td>${r.chunk?'<span class="chip">'+esc(r.chunk)+'</span>':'<span class="dim">not chunked</span>'}</td>
    <td class="mono dim">${esc(r.written_dest||'—')}</td></tr>`;
  $('#sres').innerHTML=(rs&&rs.length)?h+'</table>':'<div class="empty">No matches.</div>';
},250)}
function scanDlg(id,name){dlg(`<h1>Scan into “${esc(name)}”</h1>
  <label>Folder to catalog (walked recursively; every file SHA-256 hashed)</label>
  <input id="d1" class="full" placeholder="Y:\\nsottung\\Photos\\TARs or /mnt/pool/photos">
  <div class="row" style="margin-top:16px"><button class="btn" onclick="go()">Start scan</button></div>`,
  async()=>{const p=$('#d1').value.trim();if(!p)return;
    await api('POST',`/api/collections/${id}/scan`,{path:p});toast('Scan started — see Jobs');loc('jobs')});}
function planDlg(id,name){dlg(`<h1>Plan chunks for “${esc(name)}”</h1>
  <label>Target medium</label><select id="d1" class="full">
    <option value="LTO8">LTO-8 tape (11 TB usable)</option><option value="LTO9">LTO-9 tape (16.5 TB)</option>
    <option value="BD-R25">Blu-ray 25 GB</option><option value="BD-R50">Blu-ray 50 GB</option>
    <option value="BD-R100">Blu-ray 100 GB</option><option value="CUSTOM">Custom size…</option></select>
  <label>Custom size (GB, only for Custom/HDD)</label><input id="d2" class="full" type="number" step="0.001" placeholder="e.g. 3500">
  <label>par2 redundancy %</label><input id="d3" class="full" type="number" value="10">
  <div class="row" style="margin-top:16px"><button class="btn" onclick="go()">Plan</button></div>`,
  async()=>{const r=await api('POST','/api/plan',{collection_id:id,media_kind:$('#d1').value,
      target_gb:parseFloat($('#d2').value)||0,par2_redundancy:parseInt($('#d3').value)||0});
    toast(`Planned ${r.chunks_created?.length||0} chunk(s)`+(r.oversized_files_skipped?.length?` · ${r.oversized_files_skipped.length} oversized skipped`:''));
    if(r.staging&&r.staging.warning)toast(r.staging.warning,1);
    loc('chunks')});}

/* ---------------- Chunks ---------------- */
async function vChunks(){
  const cs=await api('GET','/api/chunks')||[];
  let h=`<h1>Chunks</h1><div class="crumb">tar → AES-256 → par2 · one chunk, one medium</div><div class="panel">`;
  if(!cs.length){h+='<div class="empty">Nothing planned yet. Plan chunks from the Vault tab.</div>'}
  else{h+='<table><tr><th>Chunk</th><th>Lifecycle</th><th class="num">Data</th><th class="num">Files</th><th>Key</th><th></th></tr>';
    for(const c of cs.sort((a,b)=>b.id-a.id)){
      h+=`<tr><td><div class="mono">${esc(c.name)}</div><div class="dim" style="font-size:11.5px">${esc(c.media_kind)} · ${esc(c.src_root)}</div>
        ${c.error?`<div class="err">${esc(c.error)}</div>`:''}</td>
      <td>${rail(c)}</td>
      <td class="num">${GB(c.data_bytes)} GB</td><td class="num">${c.file_count}</td>
      <td>${c.key_ref?'<span class="chip">'+esc(c.key_ref)+'</span>':'<span class="dim">—</span>'}</td>
      <td class="row" style="justify-content:flex-end">${actions(c)}</td></tr>`}
    h+='</table>'}
  $('#view').innerHTML=h+'</div>';
}
function actions(c){
  const b=[];
  if(c.status==='PLANNED'||c.status==='FAILED')b.push(`<button class="btn" onclick="doBuild(${c.id})">Build</button>`);
  if(c.staged_dir&&c.status!=='PLANNED'&&c.status!=='BUILDING')b.push(`<button class="btn" onclick="writeDlg(${c.id},'${esc(c.name)}')">Write…</button>`);
  if(c.written_dest){b.push(`<button class="btn ghost" onclick="doVerify(${c.id})">Verify</button>`);
    b.push(`<button class="btn ghost" onclick="restoreDlg(${c.id},'${esc(c.name)}')">Restore…</button>`)}
  return b.join('');
}
async function doBuild(id){try{await api('POST',`/api/chunks/${id}/build`);toast('Build started — see Jobs');loc('jobs')}catch(e){toast(e.message,1)}}
function writeDlg(id,name){dlg(`<h1>Write ${esc(name)}</h1>
  <label>Destination (LTFS tape mount, archive drive, burn folder)</label>
  <input id="d1" class="full" placeholder="T:\\  or  /mnt/ltfs  or  E:\\archive">
  <label>RAM buffer GB (blank = setting)</label><input id="d2" class="full" type="number" step="0.5" placeholder="16">
  <div class="row" style="margin-top:16px"><button class="btn" onclick="go()">Write + read-back verify</button></div>`,
  async()=>{const d=$('#d1').value.trim();if(!d)return;
    await api('POST',`/api/chunks/${id}/write`,{dest_dir:d,buffer_gb:parseFloat($('#d2').value)||0});
    toast('Write started — see Jobs');loc('jobs')});}
async function doVerify(id){try{const r=await api('POST',`/api/chunks/${id}/verify`,{});
  toast(r.verify_ok?'Medium verified ✓':'VERIFY FAILED — medium does not match catalog',!r.verify_ok);vChunks()}catch(e){toast(e.message,1)}}
function restoreDlg(id,name){dlg(`<h1>Restore ${esc(name)}</h1>
  <label>Source (chunk folder on the medium; blank = recorded location)</label><input id="d1" class="full">
  <label>Restore into</label><input id="d2" class="full" placeholder="D:\\restore">
  <label>Only these paths (optional, one per line)</label><textarea id="d3" class="full" rows="3" style="font:12px var(--mono)"></textarea>
  <div class="row" style="margin-top:16px"><button class="btn" onclick="go()">par2 → decrypt → extract</button></div>`,
  async()=>{const out=$('#d2').value.trim();if(!out)return;
    const mem=$('#d3').value.split('\\n').map(s=>s.trim()).filter(Boolean);
    await api('POST',`/api/chunks/${id}/restore`,{source_dir:$('#d1').value.trim(),output_dir:out,members:mem.length?mem:undefined});
    toast('Restore started — see Jobs');loc('jobs')});}

/* ---------------- Keys ---------------- */
async function vKeys(){
  const k=await api('GET','/api/keys');
  const st=k.status||{};
  let h=`<h1>Keys</h1><div class="crumb">secrets live only in keystore files — never in the catalog</div>`;
  h+=`<div class="panel"><h2>Keystores (${st.min_required} required, different devices)</h2>`;
  if(!st.ok)h+=`<div class="err" style="margin-bottom:10px">${esc(st.reason||'')}</div>`;
  h+='<table><tr><th>Path</th><th class="num">Keys</th><th>State</th></tr>';
  for(const s of st.stores||[])h+=`<tr><td class="mono">${esc(s.path)}</td><td class="num">${s.key_count}</td>
    <td>${s.reachable?'<span class="stamp VERIFIED">reachable</span>':'<span class="stamp FAILED">unreachable</span>'}</td></tr>`;
  h+=`</table><div class="row" style="margin-top:10px">
    <button class="btn ghost" onclick="api('POST','/api/keys/sync').then(r=>{toast('Synced '+r.key_count+' key(s)');vKeys()}).catch(e=>toast(e.message,1))">Sync keystores</button>
    <span class="dim">Register paths in Settings.</span></div></div>`;
  h+='<div class="panel"><h2>Key registry (fingerprints only)</h2>';
  if(!(k.keys||[]).length)h+='<div class="empty">Keys are generated automatically per chunk at build time.</div>';
  else{h+='<table><tr><th>Ref</th><th>Note</th><th>Fingerprint (SHA-256 of passphrase)</th><th></th></tr>';
    for(const m of k.keys)h+=`<tr><td><span class="chip">${esc(m.key_ref)}</span></td><td>${esc(m.note)}</td>
      <td class="mono dim">${esc((m.fingerprint||'').slice(0,24))}…</td>
      <td><a class="btn ghost" style="text-decoration:none" href="/api/keys/${esc(m.key_ref)}/qr.png" target="_blank">Print QR card</a></td></tr>`;
    h+='</table>'}
  $('#view').innerHTML=h+'</div>';
}

/* ---------------- Jobs ---------------- */
let jobsTimer;
async function vJobs(){
  const js=await api('GET','/api/jobs')||[];
  let h=`<h1>Jobs</h1><div class="crumb">long operations run in the background — safe to navigate away</div><div class="panel">`;
  if(!js.length)h+='<div class="empty">No jobs yet.</div>';
  else{h+='<table><tr><th style="width:56%">Job</th><th>Progress</th><th>State</th></tr>';
    for(const j of js)h+=`<tr><td>${esc(j.label)}</td>
      <td><div class="bar"><div style="width:${Math.round((j.progress||0)*100)}%"></div></div></td>
      <td><span class="stamp ${j.status==='COMPLETED'?'VERIFIED':j.status==='FAILED'?'FAILED':'BUILDING'}">${esc(j.status)}</span></td></tr>`;
    h+='</table>'}
  $('#view').innerHTML=h+'</div>';
  clearTimeout(jobsTimer);
  if(js.some(j=>j.status==='RUNNING'))jobsTimer=setTimeout(()=>{if(location.hash==='#jobs')vJobs()},1200);
}

/* ---------------- Settings ---------------- */
async function vSettings(){
  const [c,p]=await Promise.all([api('GET','/api/config'),api('GET','/api/preflight')]);
  const cfg=c.config||{};
  const tool=t=>p[t]&&p[t].ok?`<span class="stamp VERIFIED">found</span> <span class="mono dim">${esc(p[t].version||p[t].path||'')}</span>`
    :`<span class="stamp FAILED">missing</span>`;
  let h=`<h1>Settings</h1><div class="crumb">one config file · ${esc('config.json')} in the data folder</div>
  <div class="panel"><h2>External tools (the whole restore story)</h2>
    <table><tr><td>tar</td><td>${tool('tar')}</td></tr><tr><td>gpg</td><td>${tool('gpg')}</td></tr>
    <tr><td>par2</td><td>${tool('par2')}</td></tr></table>
    ${(p.hints||[]).map(x=>`<div class="err" style="margin-top:8px">${esc(x)}</div>`).join('')}</div>
  <div class="panel"><h2>Pipeline</h2>
    <label>Staging folder (big + fast; the NAS itself is ideal)</label>
    <input id="st" class="full" value="${esc(cfg.staging_dir||'')}" placeholder="Y:\\nsottung\\_staging">
    <label>Keystore paths — one per line, minimum 2, different physical devices</label>
    <textarea id="ks" class="full" rows="3" style="font:12px var(--mono)">${esc((cfg.keystore_paths||[]).join('\n'))}</textarea>
    <div class="row"><div style="flex:1"><label>RAM buffer (GB)</label><input id="bg" class="full" type="number" step="0.5" value="${cfg.buffer_gb||8}"></div>
      <div style="flex:1"><label>Block size (MB)</label><input id="bm" class="full" type="number" value="${cfg.block_mb||64}"></div>
      <div style="flex:1"><label>par2 redundancy %</label><input id="pr" class="full" type="number" value="${cfg.par2_redundancy||10}"></div></div>
    <div class="row" style="margin-top:14px"><button class="btn" onclick="saveCfg()">Save settings</button></div></div>`;
  $('#view').innerHTML=h;
}
async function saveCfg(){
  try{await api('PUT','/api/config',{staging_dir:$('#st').value.trim(),
    keystore_paths:$('#ks').value.split('\n').map(s=>s.trim()).filter(Boolean),
    buffer_gb:parseFloat($('#bg').value)||8,block_mb:parseInt($('#bm').value)||64,
    par2_redundancy:parseInt($('#pr').value)||10});
    toast('Settings saved');lamp();vSettings()}catch(e){toast(e.message,1)}}

/* ---------------- shell ---------------- */
let dlgGo=null;
function dlg(html,onGo){let d=$('#dlg');if(!d){d=document.createElement('dialog');d.id='dlg';document.body.append(d)}
  d.innerHTML=html+'<div class="row" style="margin-top:10px"><button class="btn ghost" onclick="document.querySelector(\'#dlg\').close()">Cancel</button></div>';
  dlgGo=async()=>{try{await onGo();d.close()}catch(e){toast(e.message,1)}};
  d.showModal()}
function go(){if(dlgGo)dlgGo()}
const views={vault:vVault,chunks:vChunks,keys:vKeys,jobs:vJobs,settings:vSettings};
function loc(v){location.hash='#'+v}
function route(){const v=(location.hash||'#vault').slice(1);
