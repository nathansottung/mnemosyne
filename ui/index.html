let jobsTimer;
function fmtETA(s){s=Math.round(s||0);if(s<=0)return '';if(s<60)return s+'s';
  const m=Math.floor(s/60),ss=s%60;if(m<60)return m+'m'+(ss?' '+ss+'s':'');
  const hh=Math.floor(m/60);return hh+'h '+(m%60)+'m'}
// Live telemetry for a job — file counts, MB/s, ETA, bytes; not just a bar.
function jobTelemetry(j){if(j.status!=='RUNNING')return '';const bits=[];
  if(j.files_total)bits.push(`${(j.files_done||0).toLocaleString()}/${j.files_total.toLocaleString()} files`);
  if(j.rate_mbps)bits.push(`<b>${j.rate_mbps} MB/s</b>`);
  if(j.eta_seconds)bits.push('ETA '+fmtETA(j.eta_seconds));
  if(j.bytes_total)bits.push(`${GB(j.bytes_done)}/${GB(j.bytes_total)} GB`);
  return bits.length?`<div class="dim mono" style="font-size:10.5px;margin-top:2px">${bits.join(' · ')}</div>`:''}
/* ---- global live Activity panel: what's running right now, on every tab ---- */
let activityTimer=null,_activityCollapsed=false,_activityDebug=false;
const fmtN=n=>(n||0).toLocaleString();
function activityMeta(j){const b=[];
  if(j.files_total)b.push(`<b>${fmtN(j.files_done)}</b>/${fmtN(j.files_total)} files`);
  if(j.rate_mbps)b.push(`<b>${j.rate_mbps}</b> MB/s`);
  if(j.bytes_total)b.push(`${GB(j.bytes_done)}/${GB(j.bytes_total)} GB`);
  if(j.eta_seconds)b.push('⏳ '+fmtETA(j.eta_seconds));
  return b.join(' · ');}
async function activity(){

files ${fmtN(j.files_done)}/${fmtN(j.files_total)} · bytes ${j.bytes_done||0}/${j.bytes_total||0}

// Show-the-artifact backstop on the Jobs row: a finished job that produced an
// artifact offers to show/open it (kit summary, mirror sidecar, drift, …).
function jobArtifact(j){if(j.status!=='COMPLETED'||!j.result)return '';const r=j.result;
  if(j.kind==='recoverykit'&&r.output_dir)return ` <button class="btn ghost" style="font-size:11px;padding:1px 8px" onclick='showKitResult(${JSON.stringify(r)})'>Show kit</button>`;
  if(j.kind==='mirror'&&r.sidecar!=null)return ` <span class="dim" style="font-size:10.5px">${r.mirrored||0} files${r.failed?' · '+r.failed+' failed':''}${r.sidecar?' · sidecar written':''}</span>`;
  if(j.kind==='reconcile'&&r.collection_id)return ` <button class="btn ghost" style="font-size:11px;padding:1px 8px" onclick="vDrift(${r.collection_id},'')">View drift (${r.changes||0})</button>`;

// Honesty on the Jobs row: plainly name what a job WRITES and where — by kind, so
// it's true whether the job is running or done. A concrete output path (from the
// finished job's result) is appended when there is one. No behavior change.
// Each job states its reads and writes SEPARATELY, so a "Writes:" line only ever
// describes writing (no label/content mismatch). {staging} is filled at render time.
const JOB_WRITES={
  scan:{reads:'your source folder (never changed)',writes:'the catalog only'},
  reconcile:{reads:'your source folders (never changed)',writes:'the catalog only'},
  build:{writes:'the package in {staging}, then the catalog — nothing to your sources'},
  write:{writes:'the package copy to the destination volume you chose, then re-reads it to verify'},
  copy:{writes:'the package copy to the destination volume you chose, then re-reads it to verify'},
  span:{writes:'the package across the destination media you chose, one at a time, each re-read to verify'},
  mirror:{reads:'your source folders (never changed)',writes:'plain files to the destination you chose, plus one inventory sidecar on that media'},
  dock:{reads:'the drive (never changed)',writes:'an inventory snapshot to the catalog only'},
  finalize:{writes:'a seal sidecar (MNEMOSYNE_SEAL) onto the volume being sealed'},
  recoverykit:{writes:'the Recovery Kit to the output folder you chose'},
  recompute:{writes:'protection status in the catalog only'},
  verify:{reads:'the media',writes:'verify records in the catalog only'},
  check:{reads:'the media',writes:'verify records in the catalog only'},
  escrow:{writes:'tool binaries into the escrow cache folder'},
  cardcheck:{reads:'the card (never changed)',writes:'nothing — it only reads and compares'},
  burn:{writes:'a disc with your burn command, then re-reads it to verify'},
};
function jobWrites(j,cfg){
  const w=JOB_WRITES[j.kind];if(!w)return '';
  const line=(label,text)=>`<div class="dim" style="font-size:11px;margin-top:2px">${label}: ${text}</div>`;
  const r=j.result||{};const p=r.output_dir||r.path||r.dir||r.staged_dir||(typeof r.sidecar==='string'?r.sidecar:'');
  const writes=(w.writes||'').replace('{staging}',(cfg&&cfg.staging_dir)?('staging ('+esc(cfg.staging_dir)+')'):'your staging folder');
  let out='';
  if(w.reads)out+=line('Reads',w.reads);
  if(writes)out+=line('Writes',writes+(p?` <span class="mono">${esc(p)}</span>`:''));
  return out;
}

async function refreshCandidates(sid){

async function planExecFromDock(planId,path,serial){
  try{const r=await api('POST','/api/plans/'+planId+'/execute',{mount_path:path,serial});

function dockReverifyDlg(sid,path){dlg(`<h1>Re-verify drive</h1>
  <div class="dim mono" style="font-size:11.5px;margin-bottom:8px">${esc(path)}</div>
  <div class="dim" style="margin-bottom:8px">Level B re-hashes the drive's full contents (content match). A/C are cheaper, path-based, and <b>advisory</b> — they cannot satisfy protection.</div>
  ${levelSelectorHTML('drl')}
  <div class="row" style="margin-top:16px"><button class="btn" onclick="go()">Re-verify at this level</button></div>`,
  async()=>{const lvl=$('#drl').value;const d=$('#dlg');if(d)d.close();dockIngest(sid,path,'reverify',lvl)})}
async function dockIngest(sid,path,mode,level,confirm){
  try{
    toast('Ingesting '+path+' — hashing & matching…');
    const r=await api('POST',`/api/dock/session/${sid}/ingest`,{mount_path:path,mode:mode||'',level:level||'',confirm:!!confirm});
    const j=await waitJob(r.job_id);
    const res=(j&&j.result)||{};
    // Pre-flight drive-mortality gate — SMART is shouting failure BEFORE the long read.
    if(res.needs_confirmation){
      dockFailingDlg(sid,path,mode,level,res);
      return;
    }
    // Pull the just-finished result off the refreshed session for the banner.
    const d=await api('GET',`/api/dock/session/${sid}`);
    const last=(d.session.drives_processed||[]).slice().sort((a,b)=>new Date(b.finished_at||0)-new Date(a.finished_at||0))[0]||{};
    let detail=`${last.label||'drive'}: ${last.matched||0} files matched (${GB(last.matched_bytes)} GB)${last.mode==='reverify'?' · re-verified':''} · ${last.unreadable||0} unreadable. ${d.coverage.pct||0}% of the selected archives now covered.`;
    const notes=(res.report&&res.report.notes)||[];
    dockBanner={message:'DONE — safe to eject. Insert the next drive.',detail,notes,
      atRisk:!!(res.report&&res.report.mirror&&res.report.mirror.at_risk)};
    vDock();
  }catch(e){toast(e.message,1)}
}
/* The drive raised a SMART failure advisory before the inventory read. Offer to
   stop and rescue data first, or continue the (non-destructive, read-only) scan. */
function dockFailingDlg(sid,path,mode,level,res){
  const h=(res.health||{});
  dlg(`<h1>Warning: This drive may be failing</h1>
    <div class="err" style="font-size:12.5px;margin-bottom:10px">${esc(res.message||h.advisory_why||'SMART reports imminent-failure signals on this drive.')}</div>
    <div class="dim mono" style="font-size:11px;margin-bottom:10px">${esc([h.reallocated_sectors?`${h.reallocated_sectors} reallocated`:'',h.pending_sectors?`${h.pending_sectors} pending`:'',(h.passed===false)?'SMART self-test FAILING':''].filter(Boolean).join(' · ')||'')}</div>
    <div class="dim" style="font-size:12px;margin-bottom:14px">Inventorying is <b>read-only</b> and never writes to the drive — but a failing disk can die mid-read. If anything here is irreplaceable, copy it off first, then continue.</div>
    <div class="row"><button class="btn danger" onclick="const d=$('#dlg');if(d)d.close();dockIngest(${sid},'${esc(path)}','${esc(mode||'')}','${esc(level||'')}',true)">Continue inventory anyway</button>
      <button class="btn ghost" onclick="const d=$('#dlg');if(d)d.close()">Stop — I'll rescue data first</button></div>`,
  async()=>{});
}

function whereRow(r){
  let paths='';

  else if(r.paths)paths=`<div class="dim" style="font-size:11.5px;margin-top:4px">none registered yet</div>`;
  const note=r.note?`<div class="dim" style="font-size:11.5px;margin-top:4px">${esc(r.note)}</div>`:'';

  return `<div class="wrow"><div class="wname">${esc(r.name)}</div><div class="wwhat">${esc(r.what)}</div>${paths}${note}${warn}</div>`;

async function ccStart(path){
  path=(path||'').trim();if(!path){toast('Pick a card or type its path first',1);return;}
  const box=$('#ccresult');if(!box)return;
  box.innerHTML=`<div class="panel"><b>Checking ${esc(path)}…</b>
    <div class="bar" style="margin-top:8px"><div id="ccbar" style="width:2%"></div></div>
    <div id="ccmsg" class="dim mono" style="font-size:11px;margin-top:6px">starting…</div></div>`;
  let start;try{start=await api('POST','/api/card-check',{path});}catch(e){toast(e.message,1);box.innerHTML='';return;}
  const jid=start.job_id;
  for(;;){
    await sleep(600);
    let jobs;try{jobs=await api('GET','/api/jobs');}catch(e){continue;}
    const j=(jobs||[]).find(x=>x.id===jid);if(!j)continue;
    const bar=$('#ccbar');if(bar)bar.style.width=Math.max(2,Math.round((j.progress||0)*100))+'%';
    const msg=$('#ccmsg');if(msg)msg.textContent=(j.label||'').split('—').slice(1).join('—').trim()||'working…';
    if(j.status==='COMPLETED'){ccRender(j.result||{},path);return;}
    if(j.status==='FAILED'){box.innerHTML=`<div class="panel"><div class="err">${esc((j.label||'card check failed').replace(/^.*ERROR:\s*/,''))}</div></div>`;return;}
  }
}
function ccTile(k,v,u){return `<div class="htile"><div class="hk">${esc(k)}</div><div class="hv">${v}</div>${u?`<div class="hu">${esc(u)}</div>`:''}</div>`;}
function ccRender(res,path){
  const box=$('#ccresult');if(!box)return;
  const tot=res.total_files||0,backedN=res.backed_up_files||0,newN=res.new_files||0;
  let banner;
  if(!tot)banner=`<div class="ccban ccneutral">No files found on ${esc(path)}.</div>`;
  else if(res.safe_to_format)banner=`<div class="ccban ccok">✓ <b>Safe to format.</b> All <b>${commaN(tot)}</b> file(s) (${GB(res.total_bytes)} GB) on this card are already backed up.</div>`;
  else banner=`<div class="ccban ccbad">Warning: <b>${commaN(newN)}</b> of ${commaN(tot)} file(s) (${GB(res.new_bytes)} GB) are <b>not backed up yet</b> — copy these off before you reformat.</div>`;
  let h=banner+`<div class="hstrip">
    ${ccTile('On the card',commaN(tot),GB(res.total_bytes)+' GB')}
    ${ccTile('Already backed up',commaN(backedN),GB(res.backed_up_bytes)+' GB')}
    ${ccTile('New / unsaved',commaN(newN),GB(res.new_bytes)+' GB')}
    ${res.skipped?ccTile('Unreadable',commaN(res.skipped),'skipped'):''}
  </div>`;
  if((res.where||[]).length)h+=`<div class="panel"><h2>Where the already-backed-up files live</h2>
    <div class="row" style="flex-wrap:wrap;gap:6px">${res.where.map(w=>`<span class="etag enc">${esc(w)}</span>`).join('')}</div></div>`;
  if(newN){
    h+=`<div class="panel" style="border-left:3px solid var(--bad)"><h2>Not backed up yet (${commaN(newN)})</h2>
      <div class="dim" style="font-size:11.5px;margin-bottom:6px">Copy these somewhere safe — and into an archive — before reformatting. Nothing here is deleted; this is simply what the tool has never seen.</div>
      <table><tr><th>File</th><th class="num">Size</th><th>Type</th></tr>`;
    for(const f of (res.new||[]))h+=`<tr><td class="mono" style="font-size:11.5px">${esc(f.rel)}</td><td class="num">${GB(f.size)} GB</td><td class="dim">${esc(f.role||'')}</td></tr>`;
    if(res.new_truncated)h+=`<tr><td colspan="3" class="dim">…and ${commaN(res.new_truncated)} more new file(s)</td></tr>`;
    h+='</table></div>';
  }
  if((res.by_ext||[]).length){
    h+=`<div class="panel"><h2>By file type</h2><table><tr><th>Type</th><th class="num">On card</th><th class="num">New</th></tr>`;
    for(const e of res.by_ext)h+=`<tr><td class="mono">${esc(e.ext||'(none)')}</td><td class="num">${commaN(e.total)}</td><td class="num">${e.new?`<b style="color:var(--warn)">${commaN(e.new)}</b>`:'0'}</td></tr>`;
    h+='</table></div>';
  }
  box.innerHTML=h;
}

  // ---- 8. Advanced (disclosure in Guided/Standard) ----
  h+=`<div class="panel"><h2>Advanced</h2>

    <label style="margin-top:14px">How many old versions of a file to remember</label>
    <input id="vr" class="full" type="number" min="0" step="1" value="${cfg.versions_retained||0}" placeholder="0 = unlimited">

    <label style="margin-top:14px">Tape drive device (optional)</label>
    <input id="td" class="full" style="font:12px var(--mono)" value="${esc(cfg.tape_device||'')}" placeholder="\\\\.\\Tape0  /dev/nst0">
    <div class="help">Which tape drive to use. Leave blank for the system default. (Point at the tape-health <i>tool</i> up in External Tools; this is the device it talks to.)</div>
    <label style="margin-top:14px">Put the recovery tools on the media itself (escrow)</label>
    <select id="eom" class="full">
      <option value="binaries-only" ${(!cfg.escrow_on_media||cfg.escrow_on_media==='binaries-only')?'selected':''}>Ready-to-run programs + checksums (smallest — the practical choice)</option>
      <option value="full" ${cfg.escrow_on_media==='full'?'selected':''}>Everything — programs plus their full source code (for recompiling or auditing)</option>
      <option value="off" ${cfg.escrow_on_media==='off'?'selected':''}>Off — nothing extra on the media (still included in the Recovery Kit)</option>
    </select>
    <div class="help">Writes the software needed to read your backups onto each sealed tape or disc ("escrow"), so the media can rebuild itself years from now even without this app. Skipped automatically when a disc is too full.</div>
    <label class="row" style="gap:8px;align-items:center;margin-top:8px"><input id="eir" type="checkbox" ${cfg.escrow_include_readers?'checked':''}> Also include source code for file-format readers</label>
    <div class="help">Adds the source for tools that open your file types (like camera RAW readers). "Everything" mode only; adds size.</div>
    <div id="escrowStat" class="dim" style="font-size:11.5px;margin-top:8px;padding:8px 10px;border:1px solid var(--line);border-radius:6px">Loading escrow cache status…</div>
    <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--line)">
      <label>Sealing a volume ("close the box and label it")</label>

      <div class="row"><div style="flex:1"><label>Every copy checked within (days)</label>

        <option value="rs03" ${cfg.burn_ecc==='rs03'?'selected':''}>On — RS03 (newer, faster to create)</option>
      </select>
      <div class="help">After a disc passes its check, add a second repair layer (made by the free tool <span class="mono dim">dvdisaster</span>) that can heal deep scratches wiping out whole regions of a disc. Purely a bonus: restoring never needs it.</div>
      <label style="margin-top:8px">Disc drive for the repair step</label>
      <input id="beccd" class="full" style="font:12px var(--mono)" value="${esc(cfg.burn_ecc_device||'')}" placeholder="/dev/sr0  or  H:">

      <label class="row" style="gap:8px;align-items:center;margin-top:8px"><input id="oecc" type="checkbox" ${cfg.optical_ecc?'checked':''}> Mention the repair layer in each disc's restore notes</label>

    <div class="row" style="margin-top:14px"><button class="btn" onclick="saveCfg()">Save advanced settings</button></div>

  $('#view').innerHTML=h;

// Just the experience-mode buttons + note (no panel wrapper) — for the General section.
function modeControl(){

  return `<div class="modepick" role="group" aria-label="How much do you want to see?">

/* ---- unified Integrity panel: three presets + a live Custom column, per-knob
   preset-match notes, and a "return to preset" button each. Owns the four integrity
   knobs (build-verify, par2, routine level, due months) via PUT /api/integrity. ---- */
function ivPresetOf(bv,par2,rl,due){
  for(const n of ['ARCHIVAL','BALANCED','FAST']){const p=_ivPresets[n];if(!p)continue;
    if(p.build_verify===bv&&String(p.par2_redundancy)===String(par2)&&p.routine_verify_level===rl&&String(p.verify_due_months)===String(due))return n;}
  return 'Custom';
}
function ivKnobMatches(key,val){const out=[];for(const n of ['ARCHIVAL','BALANCED','FAST']){const p=_ivPresets[n];if(p&&String(p[key])===String(val))out.push(n);}return out;}
function settingsIntegrity(data){
  const eff=data.effective||data.global||{};
  const presets=['ARCHIVAL','BALANCED','FAST'];
  const cell=(k,fmt)=>presets.map(n=>{const p=_ivPresets[n]||{};const v=k==='readback'?'always':fmt(p[k]);const amber=k==='build_verify'&&p.build_verify==='none';return `<td data-col="${n}" style="${amber?'color:var(--warn)':''}">${esc(String(v))}</td>`;}).join('');
  const row=(label,k,fmt,cid)=>`<tr><td>${label}</td>${cell(k,fmt)}<td class="custom" data-col="CUSTOM" id="${cid}"></td></tr>`;
  let h=`<div class="panel"><div class="row" style="justify-content:space-between;align-items:center">
    <h2 style="margin:0">Integrity — how hard each copy is proven</h2>
    <span class="ivbadge" id="iv_hdr_badge"></span></div>
    <div class="help">Pick a preset column, or edit any knob below to build a <b>Custom</b> mix — the Custom column and the badge update live. Read-back after every write is always on and can't be turned off.</div>
    <div id="ivgrid"><table class="ivgrid"><tr><th>Setting</th><th data-col="ARCHIVAL">Archival</th><th data-col="BALANCED">Balanced</th><th data-col="FAST">Fast</th><th class="custom" data-col="CUSTOM">Custom</th></tr>
      ${row('Prove each build','build_verify',v=>IV_BV[v]||v,'ivc_build_verify')}
      ${row('Repair data (par2)','par2_redundancy',v=>v+'%','ivc_par2_redundancy')}
      ${row('Routine re-check','routine_verify_level',v=>v==='B'?'B (full)':'C (sample)','ivc_routine_verify_level')}
      ${row('Re-verify due','verify_due_months',v=>v+' months','ivc_verify_due_months')}
      <tr><td>Read-back after write</td><td data-col="ARCHIVAL">always</td><td data-col="BALANCED">always</td><td data-col="FAST">always</td><td class="custom" data-col="CUSTOM">always</td></tr>
    </table></div>
    <div class="row" style="margin-top:12px;gap:8px">${presets.map(n=>`<button class="btn ghost" onclick="ivApplyPreset('${n}')">Return to ${n}</button>`).join('')}</div>
    <div id="iv_custom_note" class="advnote" style="display:none;margin-top:12px">You've changed a value away from a named preset — these are <b>Custom</b> settings. Use a "Return to …" button to snap back to a preset.</div>
    <div style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)">
      <div class="help" style="margin-top:0">Edit any knob, then Apply. Each shows which preset its current value matches.</div>
      <div class="row">
        <div style="flex:2"><div class="ivknob"><label>Prove each build</label>
          <select id="iv_bv" class="full" onchange="ivSync()">
            <option value="full"${eff.build_verify==='full'?' selected':''}>Full — contents + decrypt round-trip</option>
            <option value="contents"${eff.build_verify==='contents'?' selected':''}>Contents only</option>
            <option value="none"${eff.build_verify==='none'?' selected':''}>None — unproven (amber)</option></select>
          <span class="ivmatch" id="iv_note_bv"></span></div></div>
        <div style="flex:1"><div class="ivknob"><label>Repair data (%)</label>
          <input id="iv_par2" class="full" type="number" min="0" value="${eff.par2_redundancy}" oninput="ivSync()">
          <span class="ivmatch" id="iv_note_par2"></span></div></div></div>
      <div class="row" style="margin-top:8px">
        <div style="flex:2"><div class="ivknob"><label>Routine re-check level</label>
          <select id="iv_rl" class="full" onchange="ivSync()">
            <option value="B"${eff.routine_verify_level==='B'?' selected':''}>B — full re-hash</option>
            <option value="C"${eff.routine_verify_level==='C'?' selected':''}>C — sample the ends</option></select>
          <span class="ivmatch" id="iv_note_rl"></span></div></div>
        <div style="flex:1"><div class="ivknob"><label>Re-verify due (months)</label>
          <input id="iv_due" class="full" type="number" min="1" value="${eff.verify_due_months}" oninput="ivSync()">
          <span class="ivmatch" id="iv_note_due"></span></div></div></div>
      <div class="row" style="margin-top:12px"><button class="btn" onclick="ivApplyKnobs()">Apply integrity</button>
        <span class="dim" style="font-size:11.5px;align-self:center">Applies globally. Override per archive on the Profiles page.</span></div>
    </div>
  </div>`;
  return h;
}
function ivSync(){
  const g=id=>{const e=$('#'+id);return e?e.value:null;};
  const bv=g('iv_bv');if(bv==null)return; // panel not on screen
  const par2=g('iv_par2'),rl=g('iv_rl'),due=g('iv_due');
  const set=(id,v)=>{const e=$('#'+id);if(e)e.textContent=v;};
  set('ivc_build_verify',IV_BV[bv]||bv);
  set('ivc_par2_redundancy',(par2||0)+'%');
  set('ivc_routine_verify_level',rl==='B'?'B (full)':'C (sample)');
  set('ivc_verify_due_months',(due||0)+' months');
  const name=ivPresetOf(bv,par2,rl,due);
  const b=$('#iv_hdr_badge');if(b){b.textContent=name;const col=ivColor(name);b.style.borderColor=col;b.style.color=col;}
  document.querySelectorAll('#ivgrid [data-col]').forEach(c=>c.classList.toggle('ivactive',c.dataset.col===name.toUpperCase()));
  const cn=$('#iv_custom_note');if(cn)cn.style.display=name==='Custom'?'block':'none';
  const note=(id,key,val)=>{const e=$('#'+id);if(!e)return;const m=ivKnobMatches(key,val);
    if(m.length){e.textContent='matches '+m.join(' / ');e.classList.remove('custom');}else{e.textContent='custom value';e.classList.add('custom');}};
  note('iv_note_bv','build_verify',bv);note('iv_note_par2','par2_redundancy',par2);
  note('iv_note_rl','routine_verify_level',rl);note('iv_note_due','verify_due_months',due);
}
async function ivApplyKnobs(){
  const bv=$('#iv_bv').value;
  if(!ivConfirmLower(bv,(_ivEff||{}).build_verify,''))return;
  try{await api('PUT','/api/integrity',{build_verify:bv,par2_redundancy:parseInt($('#iv_par2').value)||0,routine_verify_level:$('#iv_rl').value,verify_due_months:parseInt($('#iv_due').value)||12});
    toast('Integrity saved');vSettings();}catch(e){toast(e.message,1)}
}
async function ivApplyPreset(name){
  const tgt=_ivPresets[name]||{};
  if(!ivConfirmLower(tgt.build_verify,(_ivEff||{}).build_verify,''))return;
  try{await api('PUT','/api/integrity',{preset:name});toast('Integrity → '+name);vSettings();}catch(e){toast(e.message,1)}
}

/* ---- External Tools panel: live detection, browse-to-binary, download links ---- */
async function loadTools(){
  const box=$('#toolsbox');if(!box)return;
  let tools;try{tools=await api('GET','/api/tools');}catch(e){box.innerHTML='<div class="err">Tools unavailable: '+esc(e.message)+'</div>';return;}
  const row=t=>{
    const stat=(t.os_note&&!t.detected)?`<span class="toolstat na">${esc(t.os_note)}</span>`
      :(t.detected?`<span class="toolstat found">found</span>`:`<span class="toolstat missing">not installed</span>`);
    const path=t.detected?`<div class="tpath">${esc(t.path||'')}${t.version?' · '+esc(t.version):''}</div>`
      :(t.configured?`<div class="tpath">pinned: ${esc(t.configured)} — not found at that path</div>`:'');
    const dl=t.download?`<a class="btn ghost" style="font-size:11px;padding:3px 8px" href="${esc(t.download)}" target="_blank" rel="noopener">Download </a>`:'';
    return `<div class="tool"><div class="tinfo"><div class="tname">${esc(t.name)}</div><div class="tadds">${esc(t.adds)}</div>${path}</div>
      <div class="tact">${stat}<div class="row" style="justify-content:flex-end">${dl}<button class="btn ghost" style="font-size:11px;padding:3px 8px" onclick="toolBrowse('${esc(t.save_key)}','${esc(t.name)}')">Browse…</button></div></div></div>`;
  };
  const req=tools.filter(t=>t.required),opt=tools.filter(t=>!t.required);
  box.innerHTML=`<div style="font:600 10px var(--mono);letter-spacing:.12em;color:var(--ink-3);margin:6px 0 2px">NEEDED FOR CORE FEATURES</div>${req.map(row).join('')}
    <div style="font:600 10px var(--mono);letter-spacing:.12em;color:var(--ink-3);margin:14px 0 2px">OPTIONAL — EACH ADDS ONE CAPABILITY</div>${opt.map(row).join('')}`;
}
function toolBrowse(saveKey,name){pickBinary('',p=>saveToolPath(saveKey,p,name));}
async function saveToolPath(saveKey,path,name){
  let payload;
  if(saveKey.indexOf('tools:')===0){payload={tools:{}};payload.tools[saveKey.slice(6)]=path;}
  else{payload={};payload[saveKey]=path;}
  try{await api('PUT','/api/config',payload);toast(name+' → '+path);loadTools();}catch(e){toast(e.message,1)}
}

/* ---- binary picker: like the folder picker, but lists files too, so you can
   select an executable (the Audacity→FFmpeg pattern). ---- */
let _pickfCb=null;
function pickBinary(start,cb){_pickfCb=cb;let d=$('#pickf');if(!d){d=document.createElement('dialog');d.id='pickf';document.body.append(d);}pickfRender(start||'');d.showModal();}
async function pickfRender(path){let data;
  try{data=await api('GET','/api/browse?files=1'+(path?('&path='+encodeURIComponent(path)):''))}catch(e){toast(e.message,1);return;}
  window._pf={path:data.path||'',dirs:data.dirs||[],files:data.files||[],parent:data.roots?'':(data.parent||'')};
  let h=`<h1>Choose a program (binary)</h1>
    <div class="row" style="gap:6px;margin-bottom:8px">
      ${data.roots?'<span class="dim mono" style="font-size:11px">drives &amp; common roots</span>':`<button class="btn ghost" style="padding:6px 10px" onclick="pickfRender(window._pf.parent)">Up</button>`}
      <input id="pickfpath" class="full" style="flex:1;font:12px var(--mono)" value="${esc(window._pf.path)}" placeholder="type or navigate to the program's file"></div>
    <div style="max-height:46vh;overflow:auto;border:1px solid var(--line);border-radius:6px">`;
  const D=window._pf.dirs,F=window._pf.files;
  if(data.roots)for(let i=0;i<D.length;i++)h+=`<div class="row" style="padding:6px 10px;border-bottom:1px solid var(--line-2);cursor:pointer;gap:8px" onclick="pickfRender(window._pf.dirs[${i}].path)"><span style="flex:1">${esc(D[i].name)}/</span></div>`;
  else{
    if(!D.length&&!F.length)h+='<div class="dim" style="padding:12px">Empty folder.</div>';
    for(let i=0;i<D.length;i++)h+=`<div class="row" style="padding:6px 10px;border-bottom:1px solid var(--line-2);cursor:pointer;gap:8px" onclick="pickfRender(window._pf.dirs[${i}].path)"><span style="flex:1">${esc(D[i].name)}/</span></div>`;
    for(let i=0;i<F.length;i++)h+=`<div class="row" style="padding:6px 10px;border-bottom:1px solid var(--line-2);cursor:pointer;gap:8px" onclick="pickfUse(window._pf.files[${i}].path)"><span style="flex:1">${esc(F[i].name)}</span></div>`;
  }
  h+=`</div><div class="row" style="margin-top:12px;justify-content:flex-end">
      <button class="btn ghost" onclick="document.querySelector('#pickf').close()">Cancel</button>
      <button class="btn" onclick="pickfUse((($('#pickfpath')||{}).value||'').trim())">Use this path</button></div>`;
  $('#pickf').innerHTML=h;
}
function pickfUse(p){const d=$('#pickf');if(d)d.close();if(_pickfCb&&p)_pickfCb(p);}

/* ---- Performance: real machine memory + staging free space ---- */
var _memTotalGB=0;
async function loadSysinfo(){
  try{const s=await api('GET','/api/sysinfo');
    const dd=$('#datadir');if(dd)dd.textContent=s.data_dir||'(unknown)';
    const m=s.memory||{};const tot=(m.total_bytes||0)/1e9,av=(m.available_bytes||0)/1e9;_memTotalGB=tot;
    const el=$('#meminfo');if(el){
      if(tot>0){const cap=Math.max(1,Math.round(tot*0.25));
        el.innerHTML=`Your machine: <b>${tot.toFixed(0)} GB</b> total${av>0?`, <b>${av.toFixed(0)} GB</b> free right now`:''} · ${s.cpus} CPU threads. Suggested cap: <b>${cap} GB</b> (25% of total).
          ${av>0?`<div class="membar" title="free vs total"><i style="width:${Math.min(100,av/tot*100).toFixed(0)}%"></i></div>`:''}`;
      }else{el.textContent="Couldn't read this machine's memory — set the buffer conservatively.";}
    }
    bufCheck();
  }catch(e){}
}
function bufCheck(){
  const el=$('#bgwarn');if(!el)return;const v=parseFloat(($('#bg')||{}).value)||0;
  if(_memTotalGB>0&&v>_memTotalGB*0.25){el.style.display='block';
    el.innerHTML=`Warning: ${v} GB is over 25% of your ${_memTotalGB.toFixed(0)} GB RAM — leave headroom for the OS and other apps. Consider <b>${Math.round(_memTotalGB*0.25)} GB</b> or less.`;}
  else el.style.display='none';
}
async function stagingSpace(){

async function saveCfg(){
  // One defensive save reading every Settings input present in the DOM (details
  // panels keep their fields in the DOM even when collapsed). The four integrity
  // knobs are NOT here — the unified Integrity panel owns them via /api/integrity.
  const gv=id=>{const e=$('#'+id);return e?e.value:undefined;};

  const num=(id,dflt)=>{const v=gv(id);if(v==null)return undefined;const n=parseFloat(v);return isNaN(n)?dflt:n;};
  const int=(id,dflt)=>{const v=gv(id);if(v==null)return undefined;const n=parseInt(v);return isNaN(n)?dflt:n;};
  const body={};const put=(k,v)=>{if(v!==undefined)body[k]=v;};
  put('staging_dir',gt('st'));

  put('default_profile',gt('defprof'));

  put('buffer_gb',num('bg',8));put('block_mb',int('bm',64));put('throttle_mbps',num('tm',0));
  put('hash_accel',gc('ha'));
  put('barcode_scheme',gt('bs')||'NSP');put('label_size',gt('lsz'));
  put('auth_token',gt('atok'));put('update_check',gc('upd'));put('private_media',gc('pm'));
  put('par2_extra_args',gt('pe'));put('versions_retained',int('vr',0));put('tape_device',gt('td'));
  put('escrow_on_media',gv('eom'));put('escrow_include_readers',gc('eir'));
  put('finalize_verify_days',int('fvd',30));put('buffer_pct',num('bpc',5));put('smart_block_finalize',gc('sbf'));
  put('burn_command',gt('bc'));put('burn_verify_mount',gt('bv'));put('burn_ecc',gv('becc'));
  put('burn_ecc_device',gt('beccd'));put('burn_ecc_carry',gc('becccarry'));put('optical_ecc',gc('oecc'));
  try{await api('PUT','/api/config',body);toast('Settings saved');lamp();vSettings();}catch(e){toast(e.message,1)}

/* ================= Conflicts ================= */
function conflictVersion(cid,v,role,isRaw){
  const bits=[];
  if(v.shot_at)bits.push('shot '+esc((v.shot_at||'').slice(0,16).replace('T',' ')));
  if(v.camera_serial)bits.push('body '+esc(v.camera_serial));
  return `<div style="flex:1;min-width:220px;border:1px solid ${isRaw?'var(--bad)':'var(--line)'};border-radius:6px;padding:8px">
    <div class="mono" style="font-size:11px;word-break:break-all">${esc(v.rel_path)}</div>
    <div class="dim" style="font-size:11px;margin-top:4px">${GB(v.size_bytes)} GB · ${esc((v.mtime||'').slice(0,10))} · hash <span class="mono">${esc(v.hash_prefix||'')}</span></div>
    ${bits.length?`<div class="dim" style="font-size:11px">${bits.join(' · ')}</div>`:''}
    <div class="dim" style="font-size:11px;margin-top:4px">${(v.locations||[]).map(esc).join(', ')||'no copy recorded'}</div>
    <div style="margin-top:8px"><button class="btn ghost" style="font-size:11px" onclick="resolveConflict(${cid},'CANONICAL',${v.file_id})">Mark this canonical</button></div>
  </div>`;
}
async function vConflicts(){
  const d=await api('GET','/api/conflicts');const cs=d.conflicts||[];
  let h=`${hdr('Conflicts','same logical file, different bytes — resolved without a source of truth','conflicts')}`;
  if(!cs.length){h+='<div class="panel"><div class="empty">✓ No conflicts to review. When two versions of the same file disagree during ingest, they land here for a human decision.</div></div>';$('#view').innerHTML=h;return}
  h+=`<div class="panel"><div class="dim" style="font-size:12px">${cs.length} conflict(s) awaiting a decision. Neither version is auto-preferred; nothing is ever discarded — the version you don't keep is retained in the file's history.</div></div>`;
  for(const c of cs){const raw=c.raw_alert;const vs=c.versions||[];
    h+=`<div class="panel" style="border-left:3px solid ${raw?'var(--bad)':'var(--warn)'}">
      <div class="row" style="align-items:baseline"><h2 style="flex:1">${esc(c.rel_path)} <span class="etag" style="font-size:9.5px">${c.class==='NO-EXIF'?'no EXIF':'same capture + body'}</span></h2>
        <span class="dim" style="font-size:11px">conflict #${c.id}</span></div>`;
    if(raw)h+=`<div class="err" style="margin:4px 0 8px">Originals should never legitimately differ — one of these may be corrupted.</div>`;
    h+=`<div class="row" style="gap:10px;align-items:stretch;flex-wrap:wrap">`;
    vs.forEach((v,i)=>{h+=conflictVersion(c.id,v,c.role,raw);if(i<vs.length-1)h+=`<div style="align-self:center;font-weight:700" class="dim">vs</div>`});
    h+=`</div>
      <div class="row" style="margin-top:10px"><button class="btn ghost" onclick="resolveConflict(${c.id},'KEEP-BOTH',0)">Keep both as independent files (rename on plan)</button></div></div>`;
  }
  $('#view').innerHTML=h;
}
async function resolveConflict(id,resolution,canonicalFileId){
  const msg=resolution==='KEEP-BOTH'?'Keep both versions as independent files?':'Mark this version canonical? The other is retained in the file\'s version history.';
  if(!confirm(msg))return;
  try{await api('POST','/api/conflicts/'+id+'/resolve',{resolution,canonical_file_id:canonicalFileId});toast('Conflict resolved');vConflicts()}catch(e){toast(e.message,1)}
}

const Q_STATUS={QUARANTINED:['staged','var(--warn)'],RESTORED:['restored','var(--ok)'],'HUMAN-REMOVED':['removed by hand','var(--ink-3)']};
function qStatusBadge(st){const[t,c]=Q_STATUS[st]||[st,'var(--ink-3)'];return `<span class="etag" style="color:${c};border-color:${c}">${t}</span>`}
async function vQuarantine(){
  const d=await api('GET','/api/quarantine');const es=d.entries||[];
  let h=hdr('Quarantine','never delete, made usable — staged, reversible, never emptied by the tool','quarantine');
  h+=`<div class="panel" style="border-left:3px solid var(--act)">
    <div style="font-size:12.5px">️ <b>${esc(d.standing_note)}</b></div>
    <div class="dim" style="font-size:11.5px;margin-top:6px">Quarantine only exists inside <b>managed territory</b> — the destinations Mnemosyne itself populated. Marking a file or folder "quarantine" moves it (bytes intact, structure preserved) into <span class="mono">${esc('_deleted')}</span> under its destination root and stops counting it toward protection. Un-quarantine is a straight reverse move. On adopted media and source drives the action does not exist.</div>
    ${(d.roots||[]).length?`<div class="dim" style="font-size:11px;margin-top:6px">Managed roots: ${(d.roots||[]).map(r=>`<span class="mono">${esc(r)}</span>`).join(' · ')}</div>`:`<div class="dim" style="font-size:11px;margin-top:6px">No managed territory yet — execute a plan to populate a destination, and its files become quarantine-eligible.</div>`}
    <div class="row" style="margin-top:10px"><button class="btn" onclick="quarantineDlg()">Quarantine a path…</button></div></div>`;
  const active=es.filter(e=>e.status==='QUARANTINED');
  h+=`<div class="panel"><h2>Staged in _deleted (${active.length} active · ${GB(d.active_bytes)} GB)</h2>`;
  if(!es.length)h+='<div class="empty">✓ Nothing quarantined. Anything you stage here can always be un-quarantined — the tool never removes it.</div>';
  else{h+='<table><tr><th>Original path</th><th>Contents</th><th class="num">Age</th><th>Marked</th><th>Status</th><th></th></tr>';
    for(const e of es){
      const who=`${esc(e.by||'user')}${e.reason?' · “'+esc(e.reason)+'”':''}`;
      const gone=e.status==='QUARANTINED'&&!e.exists;
      h+=`<tr>
        <td class="mono" style="font-size:11px;word-break:break-all">${esc(e.original_rel)}<div class="dim" style="font-size:10px">under ${esc(e.root)}</div></td>
        <td class="dim" style="font-size:11px">${e.is_dir?commaN(e.file_count)+' file(s)':'file'} · ${esc(e.human_bytes)}${gone?' <span style="color:var(--warn)">· bytes gone</span>':''}</td>
        <td class="num dim" style="font-size:11px">${e.age_days}d</td>
        <td class="dim" style="font-size:11px">${who}<div style="font-size:10px">${esc((e.at||'').slice(0,10))}</div></td>
        <td>${qStatusBadge(e.status)}</td>
        <td>${e.status==='QUARANTINED'&&e.exists?`<button class="btn ghost" style="font-size:11px" onclick="unQuarantine(${e.id})">Un-quarantine</button>`:''}</td></tr>`;
    }
    h+='</table>';}
  h+=`<div class="dim" style="font-size:11px;margin-top:8px">Removed-by-hand entries are kept as history — the tool reconciles a hand-emptied <span class="mono">${esc('_deleted')}</span> gracefully and never re-fabricates the bytes.</div></div>`;
  $('#view').innerHTML=h;
}

    <label>Destination root</label><input id="ep_dest" class="full" value="${esc(p.destination_root||'')}">${browseBtn('ep_dest')}
    <div class="row" style="margin-top:14px"><button class="btn" onclick="go()">Save</button></div>`,
  async()=>{await api('POST','/api/plans/'+id+'/update',{name:$('#ep_name').value.trim(),destination_root:$('#ep_dest').value.trim()});toast('Saved');vPlanDetail(id)})})}
async function delPlan(id){if(!confirm('Delete this plan? Nothing on disk is affected.'))return;
  try{await api('POST','/api/plans/'+id+'/delete',{});toast('Deleted');loc('plans')}catch(e){toast(e.message,1)}}
function adoptDest(id){if(!confirm('Check the destination drive and mark the files it already has (matched by content) as done?'))return;
  api('POST','/api/plans/'+id+'/adopt-destination',{}).then(r=>waitJob(r.job_id)).then(()=>{toast('Destination adopted');vPlanDetail(id)}).catch(e=>toast(e.message,1))}
function execPlanDlg(id){dlg(`<h1>Execute plan work from a drive</h1>
  <div class="dim" style="font-size:11.5px;margin-bottom:8px">Dock the source drive and give its mounted path. Only the files THIS drive can supply are copied (copy-then-verify into the planned tree). Any order; resumable. Its bytes are re-checked against the snapshot as they read.</div>
  <label>Mounted path of the source drive</label><input id="ex_mount" class="full" placeholder="E:\\ or /mnt/drive">${browseBtn('ex_mount')}
  <label>Serial (blank = detect)</label><input id="ex_serial" class="full" placeholder="optional">
  <div class="row" style="margin-top:14px"><button class="btn" onclick="go()">Execute from this drive</button></div>`,
  async()=>{const r=await api('POST','/api/plans/'+id+'/execute',{mount_path:$('#ex_mount').value.trim(),serial:$('#ex_serial').value.trim()});
    toast('Execution started — see Jobs');loc('jobs')})}

/* ---- portable export / import ---- */
function importDlg(){dlg(`<h1>Import a portable export</h1>
  <div class="dim" style="font-size:11.5px;margin-bottom:8px">Load a <b>Structure Export</b> (rebuilds an archive's knowledge in this catalog) or a <b>Plan Export</b> (lets this machine execute a move — serial binding keeps it safe). These files contain paths &amp; hashes only, never file content.</div>
  <input id="imp_file" type="file" accept=".json,application/json" class="full">
  <div class="row" style="margin-top:14px"><button class="btn" onclick="go()">Import</button></div>`,
  async()=>{const fi=$('#imp_file');if(!fi||!fi.files||!fi.files[0])throw new Error('choose a .json export');
    const txt=await fi.files[0].text();let obj;try{obj=JSON.parse(txt)}catch(e){throw new Error('not valid JSON')}
    if(obj.format==='mnemosyne-structure'){const r=await api('POST','/api/import/structure',obj);toast('Imported archive “'+r.archive+'” — '+r.files+' file(s)');loc('vault')}
    else if(obj.format==='mnemosyne-plan'){const r=await api('POST','/api/import/plan',obj);toast('Imported plan “'+r.name+'” — '+r.files+' file(s)');loc('plans')}
    else throw new Error('unrecognized export (expected a Mnemosyne structure or plan export)')})}

/* ---------------- shell ---------------- */
let dlgGo=null;
function dlg(html,onGo){let d=$('#dlg');if(!d){d=document.createElement('dialog');d.id='dlg';document.body.append(d)}
  d.innerHTML=html+'<div class="row" style="margin-top:10px"><button class="btn ghost" onclick="document.querySelector(\'#dlg\').close()">Cancel</button></div>';
  dlgGo=async()=>{try{await onGo();d.close()}catch(e){toast(e.message,1)}};
  d.showModal()}
function go(){if(dlgGo)dlgGo()}
const views={home:vHome,vault:vVault,protection:vProtection,integrity:vIntegrity,packages:vChunks,burn:vBurn,volumes:vVolumes,locations:vLocations,dock:vDock,cardcheck:vCardCheck,events:vEvents,templates:vTemplates,plans:vPlans,conflicts:vConflicts,quarantine:vQuarantine,keys:vKeys,jobs:vJobs,settings:vSettings,where:vWhere};
function loc(v){location.hash='#'+v}

/* ---- grouped, collapsible navigation with plain job-description tooltips ---- */
// Each item: [view, label, one-line plain job description (hover title + tap-hold)].
// Groups are ordered by workflow; SITUATIONAL groups (things you only touch for a
// specific setup or problem) default collapsed — "nothing relevant → collapsed" —
// while the two everyday groups start open. The user's manual expand/collapse is
// remembered, and the group holding the current page is always shown open.
// Each item: [view, label, one-line plain job description, min-mode].
// min-mode is the LEAST verbose "How much do you want to see?" mode at which the item
// shows in the nav by default. Core-journey items are 'guided' (always shown);
// everything else is 'standard' — in Guided mode those sit behind a per-group "Show
// more tools" reveal, but remain reachable by direct link and search.
const NAV_GROUPS=[
  {id:'ORGANIZE',situational:false,items:[
    ['home','Home','Your dashboard: the health of everything you keep, at a glance','guided'],
    ['vault','Archives','Your data, organized — browse archives and find any file','guided'],
    ['events','Events / Collections','Group files by the shoot, session, or project they belong to','standard'],
    ['templates','Templates','Rules for where organized files should live','standard'],
  ]},
  {id:'INGEST',situational:true,items:[
    ['cardcheck','Check a card',"Plug in an SD card or drive and see what's already backed up — before you format",'guided'],
    ['dock','Inventory drives',"Plug in a drive, get a complete record of what's on it",'guided'],
  ]},
  {id:'PROTECT',situational:false,items:[
    ['packages','Packages','Sealed, verified bundles ready for tape, disc, or drive','guided'],
    ['burn','Burn','Write discs, one at a time, resumable','standard'],
    ['plans','Plans','Reorganize cold drives into a clean structure, drive by drive','standard'],
    ['protection','Profiles',"Your safety goal — how many copies, media types, and offsite — and who's meeting it",'standard'],
  ]},
  {id:'CHECK',situational:true,items:[
    ['integrity','Verify','How thoroughly to check your backups — and run those checks','guided'],
    ['conflicts','Conflicts','Two versions of one file disagree — pick which to keep','standard'],
  ]},
  {id:'RECOVER',situational:true,items:[
    ['keys','Keys','The passphrases that unlock your encrypted backups — needed to restore','standard'],
    ['quarantine','Quarantine','Safely set files aside without ever deleting them','standard'],
  ]},
  {id:'SYSTEM',situational:true,items:[
    ['volumes','Volumes','Every tape, disc, and drive you have registered, and its health','standard'],
    ['locations','Locations','The physical places your media live — home, office, offsite','standard'],
    ['jobs','Jobs','Long-running tasks and their progress','standard'],
    ['settings','Settings','Set up tools, folders, and how the app behaves','guided'],
  ]},
];
// view -> job description + min-mode, derived from the nav table.
const viewDesc={},viewMin={};
for(const g of NAV_GROUPS)for(const it of g.items){viewDesc[it[0]]=it[2];viewMin[it[0]]=it[3]||'guided';}
// "How much do you want to see?" — purely presentational; changes visibility/verbosity, never data or behavior.
let _uiMode='guided';
const MODE_RANK={guided:0,standard:1,complete:2};
function modeRank(m){return MODE_RANK[m]!=null?MODE_RANK[m]:0}
function modeLabel(m){return m==='complete'?'Everything':m==='standard'?'Standard':'Guided'}
function modeAtLeast(need){return modeRank(_uiMode)>=modeRank(need)}
function navCollapsedState(){try{return JSON.parse(localStorage.getItem('navCollapsed')||'{}')||{}}catch(e){return {}}}
function navSetCollapsed(id,collapsed){const s=navCollapsedState();s[id]=collapsed;try{localStorage.setItem('navCollapsed',JSON.stringify(s))}catch(e){}}
function navGroupCollapsed(g){const s=navCollapsedState();return (id=>id in s?s[id]:g.situational)(g.id);}
// ONE roll-up mechanism: collapsible groups. How MANY tools show is the mode
// (Essentials / More / Everything), chosen once at the foot of the nav — no
// per-group "show more" reveal, so there is no second layer of nesting.
let _navStart=false; // show the "start here" cue on Home while the catalog is empty
function renderNav(){
  const box=$('#navgroups');if(!box)return;
  const active=(location.hash||'#home').slice(1);
  const guided=_uiMode==='guided';
  const link=([v,label,desc])=>`<a href="#${v}" data-v="${v}" title="${esc(desc)}" data-desc="${esc(desc)}"${v===active?' class="on"':''}>${esc(label)}${(v==='home'&&_navStart)?'<span class="navstart">start here</span>':''}</a>`;
  box.innerHTML=NAV_GROUPS.map(g=>{
    // Guided trims each group to its core items; Standard/Everything show all.
    const items=guided?g.items.filter(it=>modeAtLeast(it[3]||'guided')):g.items;
    if(!items.length)return ''; // nothing to show for this group in this mode
    const hasActive=items.some(it=>it[0]===active);
    // Situational groups roll up by default (remembered), but never the page you're on.
    // Guided keeps everything open — few items, so no surprise-hidden core tools.
    const collapsed=!guided&&navGroupCollapsed(g)&&!hasActive;
    return `<div class="grp${collapsed?' collapsed':''}" data-grp="${g.id}">
      <button class="grphdr" type="button" aria-expanded="${collapsed?'false':'true'}" onclick="navToggle('${g.id}')"><span class="caret"></span>${g.id}</button>
      <div class="grpitems">${items.map(link).join('')}</div></div>`;
  }).join('')+navModeControl();
  navBindLongPress();
}
// The single verbosity control — how much of the app to show. Replaces the old
// per-group "Show more tools" reveals so the sidebar has one roll-up, not two.
function navModeControl(){
  const opt=(m,l,d)=>`<button type="button" class="${_uiMode===m?'on':''}" title="${esc(d)}" onclick="setUIMode('${m}')">${l}</button>`;
  return `<div class="navmode-lbl">HOW MUCH TO SHOW</div>
    <div class="navmode" role="group" aria-label="How much to show">
      ${opt('guided','Essentials','Core journey only')}
      ${opt('standard','More','Full navigation')}
      ${opt('complete','All','Everything, dense')}
    </div>`;
}
// Track the empty-catalog state so Home can wear a "start here" cue. Cheap; called
// at startup and whenever the overview is (re)computed.
async function refreshStartHere(){
  try{const h=await api('GET','/api/home');const empty=!!h.empty;if(empty!==_navStart){_navStart=empty;renderNav();}}catch(e){}
}
function navToggle(id){
  const el=document.querySelector(`.grp[data-grp="${id}"]`);if(!el)return;
  const nowCollapsed=!el.classList.contains('collapsed');
  el.classList.toggle('collapsed',nowCollapsed);
  const hdr=el.querySelector('.grphdr');if(hdr)hdr.setAttribute('aria-expanded',String(!nowCollapsed));
  navSetCollapsed(id,nowCollapsed);
}
// Tap-hold on touch/narrow screens: long-press a nav item to read its job description.
function navBindLongPress(){
  document.querySelectorAll('#navgroups a[data-desc]').forEach(a=>{
    let t=null;const start=()=>{t=setTimeout(()=>toast(a.dataset.desc),450)};
    const cancel=()=>{if(t){clearTimeout(t);t=null}};
    a.addEventListener('touchstart',start,{passive:true});
    a.addEventListener('touchend',cancel);a.addEventListener('touchmove',cancel);a.addEventListener('touchcancel',cancel);
  });
}
// The "How much do you want to see?" picker (Settings top + first-run). Saving it
// changes ONLY visibility/verbosity — never data or behavior.
function modePicker(){
  const opt=(m,label,desc)=>`<button type="button" class="${_uiMode===m?'on':''}" onclick="setUIMode('${m}')" title="${esc(desc)}">${label}</button>`;
  return `<div class="panel"><h2>How much do you want to see?</h2>
    <div class="modepick" role="group" aria-label="How much do you want to see?">
      ${opt('guided','Guided','Core journey only; advanced tools tucked behind a reveal; a one-line purpose on every screen')}
      ${opt('standard','Standard','Full navigation; advanced settings behind an “Advanced” disclosure')}
      ${opt('complete','Everything','Everything visible and dense; no hand-holding')}
    </div>
    <div class="help" style="margin-top:8px">This changes only what's shown and how much is explained — <b>never your data, and never how the app works</b>. Switch anytime. Hidden tools still open from a link or search.</div>
  </div>`;
}
async function setUIMode(m){if(!MODE_RANK[m])return;_uiMode=m;
  try{await api('PUT','/api/config',{ui_mode:m})}catch(e){toast(e.message,1)}
  route(); // re-renders nav + the current view at the new verbosity
}
// Mode chrome: in Guided, a one-line purpose on every screen; and whenever you open a
// view above your current mode (via link/search), a small "advanced tool" note.
function injectModeChrome(v){
  const view=$('#view');if(!view)return;
  let pre='';
  if(!modeAtLeast(viewMin[v]||'guided'))
    pre+=`<div class="advnote">This is an advanced tool — outside your “${esc(modeLabel(_uiMode))}” view, shown because you opened it directly. It works exactly as normal.</div>`;
  if(_uiMode==='guided'&&viewDesc[v])
    pre+=`<div class="purpose">${esc(viewDesc[v])}</div>`;
  if(pre)view.insertAdjacentHTML('afterbegin',pre);
}
function route(){const v=(location.hash||'#home').slice(1);
  renderNav(); // active item's group auto-expands + highlights
  Promise.resolve((views[v]||vHome)()).then(()=>injectModeChrome(v)).catch(e=>toast(e.message,1));
}
window.addEventListener('hashchange',route);
// Load the saved view mode before the first paint, then render.
(async()=>{try{const c=await api('GET','/api/config');if(c&&c.config&&c.config.ui_mode)_uiMode=c.config.ui_mode;}catch(e){}
  renderNav();route();refreshStartHere();})();
lamp();setInterval(lamp,20000);activity();
// Sidebar version comes from the one source of truth (/api/health), never hardcoded.
api('GET','/api/health').then(h=>{const w=$('#wordsub');if(w&&h&&h.version)w.textContent='archival vault · '+h.version}).catch(()=>{});
</script>
</body>
